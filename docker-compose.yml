services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: h-links-oracle
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${DB_USERNAME}
      APP_USER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    build: .
    container_name: h-links-app
    ports:
      - "8081:8080"
    volumes:
      - ./storage:/app/storage
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      HLINKS_FFMPEG_COMMAND: ffmpeg
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      HLINKS_STORAGE_TYPE: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ap-northeast-2
      AWS_S3_BUCKET: amzn-hlinks-s3-bucket

      HLINKS_CHROMA_BASE_URL: http://chroma:8000
      HLINKS_CHROMA_COLLECTION_NAME: hlinks_course_transcript_chunks
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small

      COFFEE_CHAT_MAIL_ENABLED: ${COFFEE_CHAT_MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@hlinks.local}

    depends_on:
      oracle:
        condition: service_healthy
      chroma:
        condition: service_started

  chroma:
    image: chromadb/chroma
    container_name: h-links-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data

volumes:
  oracle-data:
  chroma-data:
