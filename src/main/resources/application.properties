spring.application.name=H-Links

server.port=8080
#server.servlet.session.persistent=false
spring.cache.type=caffeine
spring.cache.cache-names=dashboardNews,competencyEvaluation
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

file.upload.root=./storage/uploads
hlinks.storage.type=s3
hlinks.storage.s3.bucket=${AWS_S3_BUCKET}
hlinks.storage.s3.region=${AWS_REGION:ap-northeast-2}
hlinks.storage.s3.prefix=
hlinks.storage.s3.presigned-url-expiration-minutes=10

#ffmpeg
hlinks.ffmpeg.command=ffmpeg
hlinks.ffmpeg.temp-dir=./storage/temp/audio
hlinks.ffmpeg.timeout-seconds=120
hlinks.ffmpeg.cleanup-retention-hours=24

#stt
hlinks.stt.provider=openai
hlinks.stt.api-url=https://api.openai.com/v1/audio/transcriptions
hlinks.stt.api-key=${OPENAI_API_KEY}
hlinks.stt.model=whisper-1
hlinks.stt.language=ko
hlinks.stt.timeout-seconds=120

#ai quiz
hlinks.ai.quiz.provider=openai
hlinks.ai.quiz.api-url=https://api.openai.com/v1/chat/completions
hlinks.ai.quiz.api-key=${OPENAI_API_KEY}
hlinks.ai.quiz.model=gpt-4o-mini
hlinks.ai.quiz.temperature=0.2
hlinks.ai.quiz.timeout-seconds=120

#openai embedding
hlinks.ai.embedding.provider=openai
hlinks.ai.embedding.api-url=https://api.openai.com/v1/embeddings
hlinks.ai.embedding.api-key=${OPENAI_API_KEY}
hlinks.ai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
hlinks.ai.embedding.timeout-seconds=60

#chroma vector db
hlinks.chroma.base-url=${HLINKS_CHROMA_BASE_URL:http://localhost:8000}
hlinks.chroma.collection-name=${HLINKS_CHROMA_COLLECTION_NAME:hlinks_course_transcript_chunks}
hlinks.chroma.timeout-seconds=10

#ai course summary
hlinks.ai.course-summary.provider=openai
hlinks.ai.course-summary.api-url=https://api.openai.com/v1/chat/completions
hlinks.ai.course-summary.api-key=${OPENAI_API_KEY}
hlinks.ai.course-summary.model=gpt-4o-mini
hlinks.ai.course-summary.temperature=0.2
hlinks.ai.course-summary.timeout-seconds=120

#ai competency summary
hlinks.ai.competency-summary.provider=openai
hlinks.ai.competency-summary.api-url=https://api.openai.com/v1/chat/completions
hlinks.ai.competency-summary.api-key=${OPENAI_API_KEY:}
hlinks.ai.competency-summary.model=gpt-4o-mini
hlinks.ai.competency-summary.temperature=0.2
hlinks.ai.competency-summary.timeout-seconds=60

#dashboard news
hlinks.news.news-api.api-url=https://newsapi.org/v2/everything
hlinks.news.news-api.api-key=${NEWS_API_KEY:}
hlinks.news.news-api.page-size=20
hlinks.news.news-api.timeout-seconds=3
hlinks.news.translation.api-url=https://api-free.deepl.com/v2/translate
hlinks.news.translation.api-key=${DEEPL_API_KEY:}
hlinks.news.translation.target-lang=KO
hlinks.news.translation.timeout-seconds=3

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# coffee chat mail
hlinks.coffee-chat.mail.enabled=${COFFEE_CHAT_MAIL_ENABLED:false}
hlinks.coffee-chat.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@hlinks.local}}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

