<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="site-header" th:fragment="header">
    <div class="site-header__inner">
        <a class="site-header__logo" th:href="@{/}" aria-label="H-Links 홈">
            <span class="site-header__logo-prefix">THE</span>
            <span class="site-header__logo-main">
                <span class="site-header__logo-accent">H</span>LINKs
            </span>
        </a>

        <nav class="site-header__nav" aria-label="주요 메뉴">
            <a class="site-header__nav-item"
               th:classappend="${activeMenu == 'home'} ? ' is-active'"
               th:href="@{/}">홈</a>
            <a class="site-header__nav-item"
               th:classappend="${activeMenu == 'courses'} ? ' is-active'"
               th:href="@{/courses}">교육 콘텐츠</a>
            <a class="site-header__nav-item"
               th:classappend="${activeMenu == 'recommend'} ? ' is-active'"
               th:href="@{/courses/career-path}">추천</a>
            <a class="site-header__nav-item"
               th:classappend="${activeMenu == 'kcy'} ? ' is-active'"
               th:href="@{/kcy}">KCY TEST</a>

            <div class="site-header__role-actions">
                <a class="site-header__team-button"
                   th:href="@{/team}"
                   sec:authorize="hasAuthority('ROLE_LEADER')">
                    My팀
                </a>

                <a class="site-header__hr-button"
                   th:href="@{/hr}"
                   sec:authorize="hasAuthority('ROLE_HR')">
                    관리자 대시보드
                </a>
            </div>
        </nav>

        <div class="site-header__actions" sec:authorize="isAuthenticated()">
            <div class="site-header__profile-menu">
                <a class="site-header__profile"
                   th:classappend="${activeMenu == 'mypage'} ? ' is-active'"
                   th:href="@{/mypage}"
                   aria-label="마이페이지로 이동">
                    <div class="site-header__profile-text">
                        <span class="site-header__team"
                              th:text="${#authentication.principal.departmentName != null ? #authentication.principal.departmentName : '소속 미지정'}">
                          소속 미지정
                        </span>
                        <strong class="site-header__name">
                            <span th:text="${#authentication.principal.name}">사용자</span>
                            <span th:if="${#authentication.principal.positionName != null}"
                                  th:text="${' ' + #authentication.principal.positionName}">
                              직급
                            </span>
                        </strong>
                    </div>
                    <div class="site-header__avatar" aria-hidden="true"
                         th:text="${#authentication.principal.name != null ? #authentication.principal.name.substring(0, 1) : '?'}">
                        MG
                    </div>
                </a>

            </div>
        </div>
    </div>

</header>
</body>
</html>
