<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>H-Links | 내 신청 내역</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <!-- 신규 분리된 리팩터링 스타일시트 탑재 -->
    <link rel="stylesheet" th:href="@{/css/applications.css}">
</head>
<body class="mypage-page">

<div th:replace="~{fragments/header :: header}"></div>

<main class="mypage-shell layout-container">

    <!-- 와이어프레임 매칭을 위한 좌측 서브메뉴 & 우측 신청 내역 메인 영역 Layout 구성 -->
    <div class="mypage-content-layout">
        
        <!-- 좌측 서브메뉴 구조 -->
        <aside th:replace="~{mypage/fragments/aside :: aside('myApplications')}"></aside>

        <!-- 우측 신청 내역 상세 정보 -->
        <section class="mypage-main-content" aria-label="내 신청 내역 목록">
            
            <!-- 상단 타이틀 & 필터 폼 -->
            <div class="applications-header">
                <div class="applications-header__title-area">
                    <h2>강의 신청 내역</h2>
                    <p>신청한 강의와 승인 상태를 최신순으로 확인합니다.</p>
                </div>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn is-active" onclick="filterApplications('ALL', this)">
                    전체 <span class="filter-count" th:text="${#lists.size(applications)}">0</span>
                </button>
                <button class="filter-btn" onclick="filterApplications('WAITING', this)">
                    대기 <span class="filter-count" th:text="${#lists.size(applications.?[applicationStatus.name() == 'WAITING'])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterApplications('APPROVED', this)">
                    승인 완료 <span class="filter-count" th:text="${#lists.size(applications.?[applicationStatus.name() == 'APPROVED'])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterApplications('REJECTED', this)">
                    반려 <span class="filter-count" th:text="${#lists.size(applications.?[applicationStatus.name() == 'REJECTED'])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterApplications('CANCELED', this)">
                    취소 완료 <span class="filter-count" th:text="${#lists.size(applications.?[applicationStatus.name() == 'CANCELED'])}">0</span>
                </button>
            </div>

            <!-- 신청 내역 0건일 때의 CTA 화면 처리 -->
            <div th:if="${#lists.isEmpty(applications)}" class="applications-empty">
                <div class="applications-empty__icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 6V12M12 16H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="applications-empty__text">신청한 내역이 없습니다.</p>
                <a th:href="@{/courses}" class="btn-empty-cta">교육 콘텐츠 바로가기</a>
            </div>

            <!-- 신청 내역이 존재하는 경우 목록 표시 -->
            <div th:unless="${#lists.isEmpty(applications)}" class="applications-list">
                <div class="application-card" th:each="app : ${applications}" th:data-status-filter="${app.applicationStatus.name()}">
                    <div class="application-card__left">
                        <div class="application-card__icon">
                            <!-- 책/교육을 상징하는 SVG 아이콘 -->
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 6.25278V19.2528M12 6.25278C10.8321 5.47417 9.20875 5 7.5 5C5.79125 5 4.16788 5.47417 3 6.25278V19.2528C4.16788 18.4742 5.79125 18 7.5 18C9.20875 18 10.8321 18.4742 12 19.2528M12 6.25278C13.1679 5.47417 14.7913 5 16.5 5C18.2088 5 19.8321 5.47417 21 6.25278V19.2528C19.8321 18.4742 18.2088 18 16.5 18C14.7913 18 13.1679 18.4742 12 19.2528" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="application-card__content">
                            <div class="application-card__tag-row">
                                <span class="badge-course-type"
                                      th:classappend="${app.courseType == 'OFFLINE'} ? 'offline' : 'online'"
                                      th:text="${app.courseType == 'OFFLINE'} ? '오프라인 특강' : '온라인 과정'">온라인</span>
                                
                                <div th:switch="${app.applicationStatus.name()}">
                                    <span th:case="'WAITING'" class="badge-status waiting">대기</span>
                                    <span th:case="'APPROVED'" class="badge-status approved">승인</span>
                                    <span th:case="'REJECTED'" class="badge-status rejected">반려</span>
                                    <span th:case="'CANCELED'" class="badge-status canceled">취소</span>
                                </div>
                            </div>
                            <h3 class="application-card__title" th:text="${app.courseTitle}">Java 프로그래밍 핵심 가이드</h3>
                            <div class="application-card__meta">
                                <span th:text="'신청일: ' + ${app.appliedAt}">신청일: 2026-07-03</span>
                                <span th:text="'강사: ' + ${app.instructorName}">강사: 홍길동</span>
                                <span th:if="${app.courseType == 'OFFLINE' and app.location != null}" th:text="'장소: ' + ${app.location}">장소: 본관 대강당</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="application-card__actions">
                        <button class="btn-card-action btn-detail" type="button"
                                th:data-title="${app.courseTitle}"
                                th:data-type="${app.courseType}"
                                th:data-status="${app.applicationStatus.name()}"
                                th:data-location="${app.location}"
                                th:data-start="${app.courseStartDate}"
                                th:data-end="${app.courseEndDate}"
                                th:data-reject="${app.rejectReason}"
                                onclick="openDetailModal(this)">
                            상세보기
                        </button>

                        <!-- 취소 버튼 노출 조건식 고도화 적용 -->
                        <button th:if="${app.applicationStatus.name() == 'WAITING' or (app.applicationStatus.name() == 'APPROVED' and app.courseType == 'OFFLINE' and (app.applyEndDate == null or !T(java.time.LocalDate).now().isAfter(app.applyEndDate)))}"
                                class="btn-card-action btn-cancel"
                                type="button"
                                th:onclick="openCancelConfirmModal([[${app.courseId}]], [[${app.courseTitle}]])">
                            신청 취소
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- 1. 신청 상세 내역 커스텀 모달 -->
<div id="detailModal" class="overlay-modal">
    <div class="window-modal">
        <div class="header-modal">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 9V14M12 17.01L12.01 16.9989M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>신청 상세 정보</span>
        </div>
        <div class="modal-body">
            <div class="grid-modal-info">
                <div class="row-modal-info">
                    <div class="label-modal">과정명</div>
                    <div id="mdlTitle" class="val-modal" style="font-weight: 700; color: var(--color-text-primary);">-</div>
                </div>
                <div class="row-modal-info">
                    <div class="label-modal">교육 형태</div>
                    <div id="mdlType" class="val-modal">-</div>
                </div>
                <div class="row-modal-info">
                    <div class="label-modal">심사 상태</div>
                    <div id="mdlStatus" class="val-modal">-</div>
                </div>

                <div id="mdlOfflinePanel" style="display: none;">
                    <div class="row-modal-info">
                        <div class="label-modal">강의 장소</div>
                        <div id="mdlLocation" class="val-modal" style="color: #7c3aed; font-weight: 600;">-</div>
                    </div>
                    <div class="row-modal-info">
                        <div class="label-modal">교육 일정</div>
                        <div id="mdlSchedule" class="val-modal">-</div>
                    </div>
                </div>
            </div>

            <div id="mdlRejectPanel" class="box-reject-reason" style="display: none;">
                <strong>⚠️ 심사 반려 사유</strong>
                <div id="mdlRejectReason">-</div>
            </div>
        </div>
        <div class="footer-modal">
            <button class="btn-modal" type="button" onclick="closeDetailModal()">닫기</button>
        </div>
    </div>
</div>

<!-- 2. 신규 신청 취소 확인 커스텀 모달 -->
<div id="cancelConfirmModal" class="overlay-modal">
    <div class="window-modal">
        <div class="header-modal modal-danger">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 9V14M12 17.01L12.01 16.9989M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>신청 취소 확인</span>
        </div>
        <div class="modal-body">
            <p class="modal-body__desc">
                정말 <strong id="cancelTargetTitle">-</strong> 과정의 수강 신청을 취소하시겠습니까?<br>
                취소 완료 후에는 복구가 불가할 수 있습니다.
            </p>
        </div>
        <div class="footer-modal">
            <button class="btn-modal" type="button" onclick="closeCancelConfirmModal()">돌아가기</button>
            <button class="btn-modal btn-danger-action" type="button" 
                    th:onclick="confirmCancelApplication([[${_csrf.token}]], [[${_csrf.headerName}]])">신청취소</button>
        </div>
    </div>
</div>

<!-- 3. 수강취소 성공 임시 토스트 알림상자 -->
<div id="successToast" class="toast-notification">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 12L11 14L15 10M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>강의 신청 취소 처리가 완료되었습니다.</span>
</div>

<!-- JS 분리 탑재 -->
<script th:src="@{/js/applications.js}"></script>
</body>
</html>
