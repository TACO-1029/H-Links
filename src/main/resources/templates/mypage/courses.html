<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H-Links | 나의 수강현황</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <link rel="stylesheet" th:href="@{/css/applications.css}">
    <link rel="stylesheet" th:href="@{/css/mypage-courses.css}">
</head>
<body class="mypage-page">

<div th:replace="~{fragments/header :: header}"></div>

<main class="mypage-shell layout-container">

    <!-- 와이어프레임 매칭을 위한 좌측 서브메뉴 & 우측 수강현황 레이아웃 구성 -->
    <div class="mypage-content-layout">
        
        <!-- 좌측 서브메뉴 구조 -->
        <aside th:replace="~{mypage/fragments/aside :: aside('myCourses')}"></aside>

        <!-- 우측 메인 영역 -->
        <section class="mypage-main-content" aria-label="내 수강 현황">
            <div class="applications-header">
                <div class="applications-header__title-area">
                    <h2>강의 수강 현황</h2>
                    <p>수강 중인 강의와 최근 학습 활동을 한눈에 확인합니다.</p>
                </div>
            </div>

            <!-- 수강 상태별 필터 탭 -->
            <div class="filter-buttons">
                <button class="filter-btn is-active" onclick="filterCourses('ALL', this)">
                    전체 <span class="filter-count" th:text="${#lists.size(statusDto.inProgressCourses.?[!(categoryType == 'CAREER_HIGH' and courseType == 'OFFLINE')])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterCourses('NOT_STARTED', this)">
                    수강 전 <span class="filter-count" th:text="${#lists.size(statusDto.inProgressCourses.?[!(categoryType == 'CAREER_HIGH' and courseType == 'OFFLINE') and learningStatus == 'NOT_STARTED'])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterCourses('IN_PROGRESS', this)">
                    수강 중 <span class="filter-count" th:text="${#lists.size(statusDto.inProgressCourses.?[!(categoryType == 'CAREER_HIGH' and courseType == 'OFFLINE') and learningStatus == 'IN_PROGRESS'])}">0</span>
                </button>
                <button class="filter-btn" onclick="filterCourses('COMPLETED', this)">
                    수료 완료 <span class="filter-count" th:text="${#lists.size(statusDto.inProgressCourses.?[!(categoryType == 'CAREER_HIGH' and courseType == 'OFFLINE') and learningStatus == 'COMPLETED'])}">0</span>
                </button>
            </div>

            <div class="courses-layout">
                <!-- 좌측 수강 목록 리스트 -->
                <div class="courses-left-section">
                    <!-- 수강 리스트 -->
                    <div th:if="${#lists.isEmpty(statusDto.inProgressCourses)}" class="applications-empty">
                        <div class="applications-empty__icon">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 6V12M12 16H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <p class="applications-empty__text" style="margin-bottom: 20px; color: var(--color-text-secondary); font-weight: var(--font-semibold);">현재 수강 중이거나 승인 완료된 강의가 없습니다.</p>
                        <a th:href="@{/courses}" class="btn-empty-cta">교육 콘텐츠 바로가기</a>
                    </div>

                    <div th:unless="${#lists.isEmpty(statusDto.inProgressCourses)}" class="course-card-list">
                        <div th:each="course : ${statusDto.inProgressCourses}" 
                             th:if="${!(course.categoryType == 'CAREER_HIGH' and course.courseType == 'OFFLINE')}"
                             class="course-item-card" 
                             th:data-status="${course.learningStatus}">
                            
                            <div class="course-item-info" style="flex-grow: 1; min-width: 0;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; width: 100%;">
                                    <span class="course-item-tag" 
                                          th:classappend="${course.learningStatus == 'COMPLETED'} ? 'completed' : (${course.progressRate > 0 or course.learningStatus == 'IN_PROGRESS'} ? 'in-progress' : 'not-started')"
                                          th:text="${course.learningStatus == 'COMPLETED'} ? '수료 완료' : (${course.progressRate > 0 or course.learningStatus == 'IN_PROGRESS'} ? '수강 중' : '수강 전')"
                                          style="margin-bottom: 0;">수강 중</span>
                                    <span class="course-item-tag" 
                                          th:classappend="${course.categoryType == 'CAREER_PATH'} ? 'online' : 'offline'"
                                          th:text="${course.categoryType == 'CAREER_PATH'} ? '커리어패스' : '커리어하이'"
                                          style="margin-bottom: 0;">구분</span>
                                </div>
                                
                                <h3 class="course-item-title" th:text="${course.courseTitle}" style="margin-top: 0; margin-bottom: 16px;">강의 제목</h3>
                                
                                <!-- 학습 진도율 -->
                                <div class="progress-container" style="margin-bottom: 0; width: 100%;">
                                    <div class="progress-label">
                                        <span>학습 진도</span>
                                        <span class="progress-label-percent" th:text="${course.progressRate} + '%'">0%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" th:style="'width: ' + ${course.progressRate} + '%'"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- 수강 액션 및 상세보기 버튼들 (세로 정렬) -->
                            <div style="display: flex; flex-direction: column; gap: 6px; align-items: stretch; flex-shrink: 0; width: 100px; margin-left: 16px;">
                                <!-- 수강시작 또는 이어보기 버튼 -->
                                <a th:if="${course.progressRate == 0 or course.learningStatus == 'NOT_STARTED'}"
                                   th:href="${course.nextChapterId != null} ? @{/courses/{courseId}/chapters/{chapterId}(courseId=${course.courseId}, chapterId=${course.nextChapterId})} : @{/courses/{courseId}(courseId=${course.courseId})}" 
                                   class="btn-continue btn-start-course" style="padding: 6px 8px; font-size: 12px; justify-content: center; width: 100%; box-sizing: border-box;">
                                    <span>수강시작</span>
                                </a>
                                <a th:if="${course.progressRate > 0 and course.learningStatus != 'NOT_STARTED'}"
                                   th:href="${course.nextChapterId != null} ? @{/courses/{courseId}/chapters/{chapterId}(courseId=${course.courseId}, chapterId=${course.nextChapterId})} : @{/courses/{courseId}(courseId=${course.courseId})}" 
                                   class="btn-continue btn-continue-course" style="padding: 6px 8px; font-size: 12px; justify-content: center; width: 100%; box-sizing: border-box;">
                                    <span>이어보기</span>
                                </a>
                                
                                <!-- 상세보기 버튼 -->
                                <a class="btn-continue" style="background: #475569; padding: 6px 8px; font-size: 12px; justify-content: center; width: 100%; box-sizing: border-box;"
                                   th:href="@{/courses/{courseId}(courseId=${course.courseId})}">
                                    <span>상세보기</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 우측 위젯 영역 -->
                <div class="courses-right-section">
                    <!-- 최근 학습 활동 -->
                    <div class="right-card">
                        <div class="right-card-title-row">
                            <h3 class="right-card-title">최근 학습 활동</h3>
<!--                            <span class="right-card-badge">실시간 기록</span>-->
                        </div>
                        
                        <div class="timeline-list">
                            <div th:each="activity : ${statusDto.learningActivities}" class="timeline-item">
                                <div class="timeline-dot"></div>
                                <div class="timeline-header">
                                    <h4 class="timeline-title" th:text="'[' + ${activity.courseTitle} + '] ' + ${activity.chapterOrder} + '강'">활동 제목</h4>
                                    <span class="timeline-time" th:text="${activity.eventAtStr}">시간</span>
                                </div>
                                <div class="timeline-body" th:text="${activity.eventType} + ': 진도율 ' + ${activity.progressRate} + '%'">상세 로그</div>
                            </div>
                            <div th:if="${#lists.isEmpty(statusDto.learningActivities)}" style="text-align: center; color: #94A3B8; font-size: 12px; padding: 16px 0;">
                                최근 학습 기록이 없습니다.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>
    </div>

</main>

<!-- 강의 상세 정보 보기 모달 팝업 -->
<div id="courseDetailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="detailCourseTitle">강의 상세 정보</h3>
            <button class="btn-modal-close" onclick="closeCourseDetailModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <dl class="mypage-info-grid" style="display: flex; flex-direction: column; gap: 12px; margin: 0; padding: 0;">
                <div class="mypage-info-row" style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F1F5F9;">
                    <dt style="font-weight: 700; color: #64748B;">구분</dt>
                    <dd id="detailCategory" style="font-weight: 700; color: #3B4043; margin: 0;">-</dd>
                </div>
                <div class="mypage-info-row" style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F1F5F9;">
                    <dt style="font-weight: 700; color: #64748B;">신청번호</dt>
                    <dd id="detailAppNo" style="font-weight: 700; color: #3B4043; margin: 0;">-</dd>
                </div>
                <div class="mypage-info-row" style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F1F5F9;">
                    <dt style="font-weight: 700; color: #64748B;">마지막 학습 위치</dt>
                    <dd id="detailLastPlay" style="font-weight: 700; color: #3B4043; margin: 0;">-</dd>
                </div>
                <div class="mypage-info-row" style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F1F5F9;">
                    <dt style="font-weight: 700; color: #64748B;">수료 여부</dt>
                    <dd id="detailCompletion" style="font-weight: 700; color: #3B4043; margin: 0;">-</dd>
                </div>
                <div class="mypage-info-row" style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F1F5F9;">
                    <dt style="font-weight: 700; color: #64748B;">형태</dt>
                    <dd id="detailType" style="font-weight: 700; color: #3B4043; margin: 0;">-</dd>
                </div>
            </dl>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/mypage-courses.js}"></script>
</body>
</html>
