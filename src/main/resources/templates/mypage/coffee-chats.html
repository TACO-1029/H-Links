<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>커피챗</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body class="mypage-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="mypage-shell layout-container">
    <div class="mypage-content-layout">
        <!-- 좌측 서브메뉴 구조 -->
        <aside th:replace="~{mypage/fragments/aside :: aside('myCoffeeChats')}"></aside>

        <!-- 우측 메인 영역 -->
        <section class="mypage-main-content">
            <section class="mypage-coffee-page" aria-label="커피챗 관리">
                <article class="mypage-card mypage-coffee-card mypage-coffee-card--wide">
                    <div class="mypage-coffee-card__header">
                        <div>
                            <p class="mypage-card__eyebrow">커피챗</p>
                            <h2>커피챗 알림</h2>
                            <p id="coffeeChatSettingMessage" class="mypage-coffee-card__notice">
                                커피챗 알림을 켜면 KCY 결과에서 보완 성향 동료에게 추천될 수 있습니다.
                            </p>
                        </div>
                        <label class="mypage-toggle">
                            <input id="coffeeChatNotifyToggle"
                                   type="checkbox"
                                   th:checked="${coffeeChatSetting != null and coffeeChatSetting.emailNotifyEnabled}">
                            <span aria-hidden="true"></span>
                            <strong>수신</strong>
                        </label>
                    </div>

                    <div class="mypage-coffee-history mypage-coffee-history--split">
                        <section>
                            <h3>받은 요청</h3>
                            <article class="mypage-coffee-request"
                                     th:each="request : ${receivedCoffeeChatRequests}"
                                     th:attr="data-request-id=${request.requestId}">
                                <strong th:text="${request.partnerName}">김수달</strong>
                                <div class="mypage-coffee-request__badges">
                                    <span th:text="${request.matchGrade + ' 매칭'}">S 매칭</span>
                                    <span class="mypage-coffee-request__status"
                                          th:text="${request.statusLabel}">대기 중</span>
                                </div>
                                <p th:text="${request.message}">커피챗 요청 메시지</p>
                                <div class="mypage-coffee-actions" th:if="${request.status == 'REQUESTED'}">
                                    <button class="mypage-coffee-action-button mypage-coffee-action-button--accept"
                                            type="button"
                                            data-coffee-action="accept">
                                        승인
                                    </button>

                                    <button class="mypage-coffee-action-button"
                                            type="button"
                                            data-coffee-action="reject">
                                        거절
                                    </button>
                                    <div class="mypage-coffee-confirm" hidden>
                                        <strong data-confirm-title>처리할까요?</strong>
                                        <div>
                                            <button type="button" data-confirm-submit>확인</button>
                                            <button type="button" data-confirm-cancel>취소</button>
                                        </div>
                                    </div>
                                </div>
                            </article>
                            <p class="mypage-coffee-empty"
                               data-empty="received"
                               th:classappend="${receivedCoffeeChatRequests == null or #lists.isEmpty(receivedCoffeeChatRequests)} ? '' : ' is-hidden'">
                                받은 커피챗 요청이 없습니다.
                            </p>
                        </section>

                        <section>
                            <h3>보낸 요청</h3>
                            <article class="mypage-coffee-request"
                                     th:each="request : ${sentCoffeeChatRequests}">
                                <strong th:text="${request.partnerName}">이강아지</strong>
                                <div class="mypage-coffee-request__badges">
                                    <span th:text="${request.matchGrade + ' 매칭'}">A 매칭</span>
                                    <span class="mypage-coffee-request__status"
                                          th:text="${request.statusLabel}">대기 중</span>
                                </div>
                                <p th:text="${request.message}">커피챗 요청 메시지</p>
                            </article>
                            <p class="mypage-coffee-empty"
                               th:classappend="${sentCoffeeChatRequests == null or #lists.isEmpty(sentCoffeeChatRequests)} ? '' : ' is-hidden'">
                                보낸 커피챗 요청이 없습니다.
                            </p>
                        </section>
                    </div>
                </article>
            </section>
        </section>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    (() => {
        const toggle = document.getElementById('coffeeChatNotifyToggle');
        const message = document.getElementById('coffeeChatSettingMessage');
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const receivedEmpty = document.querySelector('[data-empty="received"]');

        toggle?.addEventListener('change', async () => {
            const previousChecked = !toggle.checked;
            toggle.disabled = true;

            try {
                const headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };

                if (csrfToken && csrfHeader) {
                    headers[csrfHeader] = csrfToken;
                }

                const response = await fetch('/api/coffee-chats/settings', {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({emailNotifyEnabled: toggle.checked})
                });

                if (!response.ok) {
                    throw new Error('커피챗 알림 설정 저장 실패');
                }

                message.textContent = toggle.checked
                    ? '커피챗 알림 수신이 켜졌습니다. KCY 결과에서 추천 후보로 표시될 수 있습니다.'
                    : '커피챗 알림 수신이 꺼졌습니다. 추천 후보와 메일 알림에서 제외됩니다.';
            } catch (error) {
                toggle.checked = previousChecked;
                message.textContent = '설정 저장에 실패했습니다. 잠시 후 다시 시도해주세요.';
            } finally {
                toggle.disabled = false;
            }
        });

        const closeConfirmPopovers = () => {
            document.querySelectorAll('.mypage-coffee-confirm').forEach((confirm) => {
                confirm.hidden = true;
                confirm.closest('.mypage-coffee-actions')?.classList.remove('is-confirming', 'is-rejecting');
            });
        };

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.mypage-coffee-actions')) {
                closeConfirmPopovers();
            }
        });

        document.querySelectorAll('[data-coffee-action]').forEach((button) => {
            button.addEventListener('click', (event) => {
                event.stopPropagation();
                closeConfirmPopovers();

                const actions = button.closest('.mypage-coffee-actions');
                const confirm = actions.querySelector('.mypage-coffee-confirm');
                const title = confirm.querySelector('[data-confirm-title]');
                const action = button.dataset.coffeeAction;

                actions.dataset.pendingAction = action;
                title.textContent = action === 'accept' ? '승인할까요?' : '거절할까요?';
                confirm.hidden = false;
                actions.classList.add('is-confirming');
                actions.classList.toggle('is-rejecting', action === 'reject');
            });
        });

        document.querySelectorAll('[data-confirm-cancel]').forEach((button) => {
            button.addEventListener('click', (event) => {
                event.stopPropagation();
                closeConfirmPopovers();
            });
        });

        document.querySelectorAll('[data-confirm-submit]').forEach((button) => {
            button.addEventListener('click', async (event) => {
                event.stopPropagation();

                const actions = button.closest('.mypage-coffee-actions');
                const requestCard = button.closest('.mypage-coffee-request');
                const requestId = requestCard?.dataset.requestId;
                const pendingAction = actions?.dataset.pendingAction;

                if (!requestId || !pendingAction) {
                    return;
                }

                const headers = {'Accept': 'application/json'};

                if (csrfToken && csrfHeader) {
                    headers[csrfHeader] = csrfToken;
                }

                button.disabled = true;

                try {
                    const response = await fetch(
                        pendingAction === 'accept'
                            ? `/api/coffee-chats/requests/${requestId}/accept`
                            : `/api/coffee-chats/requests/${requestId}`,
                        {
                            method: pendingAction === 'accept' ? 'PATCH' : 'DELETE',
                            headers
                        }
                    );

                    if (!response.ok) {
                        throw new Error('커피챗 요청 처리 실패');
                    }

                    if (pendingAction === 'accept') {
                        requestCard.querySelector('.mypage-coffee-request__status').textContent = '승인됨';
                        actions.remove();
                    } else {
                        requestCard.remove();

                        if (!document.querySelector('[data-request-id]')) {
                            receivedEmpty?.classList.remove('is-hidden');
                        }
                    }
                } catch (error) {
                    alert('커피챗 요청 처리에 실패했습니다. 잠시 후 다시 시도해주세요.');
                } finally {
                    button.disabled = false;
                    closeConfirmPopovers();
                }
            });
        });
    })();
</script>
</body>
</html>
