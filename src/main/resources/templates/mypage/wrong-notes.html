<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H-Links | 나의 오답 노트</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <link rel="stylesheet" th:href="@{/css/applications.css}">
    <link rel="stylesheet" th:href="@{/css/mypage-courses.css}">
</head>
<body class="mypage-page">

<div th:replace="~{fragments/header :: header}"></div>

<main class="mypage-shell layout-container">
    <div class="mypage-content-layout">
        <aside th:replace="~{mypage/fragments/aside :: aside('myWrongNotes')}"></aside>

        <section class="mypage-main-content wrong-notes-page" aria-label="나의 오답 노트">
            <div class="quiz-section wrong-notes-section">
                <div class="applications-header">
                    <div class="applications-header__title-area">
                        <h2>나의 오답 노트</h2>
                        <p>틀린 퀴즈를 강의별로 모아 다시 확인합니다.</p>
                    </div>
                </div>

                <div class="quiz-grid">
                    <div th:each="note : ${statusDto.quizWrongNotes}"
                         class="quiz-card"
                         th:data-course-title="${note.courseTitle}"
                         th:data-question="${note.questionText}"
                         th:data-explanation="${note.explanation}"
                         th:data-chapter="|${note.chapterOrder}. ${note.chapterTitle}|"
                         th:data-submitted="${note.submittedOptionText}"
                         th:data-correct="${note.correctOptionText}"
                         onclick="openQuizModal(this)">

                        <div class="quiz-card-top">
                            <span class="quiz-score" th:text="${note.score} + '점'">0점</span>
                        </div>
                        <h3 class="quiz-course-title" th:text="${note.courseTitle}">Docker & Kubernetes</h3>
                        <div class="quiz-chapter-footer" th:text="|${note.chapterOrder}. ${note.chapterTitle}|">n주차 형성평가</div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(statusDto.quizWrongNotes)}" style="text-align: center; color: #94A3B8; font-size: 13px; padding: 32px; background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px; margin-top: 16px;">
                    오답 기록이 없습니다. 퀴즈를 성실히 푸셨군요!
                </div>
            </div>
        </section>
    </div>
</main>

<div id="quizModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="modalChapterTitle">2주차 형성평가</h3>
            <button class="btn-modal-close" onclick="closeQuizModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div>
                <h4 class="info-section-title">문제</h4>
                <div class="question-box" id="modalQuestionText">문제 내용</div>
            </div>
            <div>
                <h4 class="info-section-title" style="color: #EF4444;">내가 제출한 답</h4>
                <div class="submitted-option-box" id="modalSubmittedOption">선택한 오답 내용</div>
            </div>
            <div>
                <h4 class="info-section-title" style="color: #10B981;">정답</h4>
                <div class="correct-option-box" id="modalCorrectOption">정답 내용</div>
            </div>
            <div>
                <h4 class="info-section-title">해설</h4>
                <div class="explanation-box" id="modalExplanationText">해설 내용</div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/mypage-courses.js}"></script>
</body>
</html>
