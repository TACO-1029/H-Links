<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>커리어패스 - H-Link</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/career-path/career_weclome.css}">
</head>
<body class="career-path-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="career-welcome-container">
    <div class="career-welcome-bubble-wrap">
        <div class="s-avatar-wrap career-reveal career-reveal--intro" aria-hidden="true">
            <img
                    th:src="@{/images/secretary.png}"
                    onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/bottts/svg?seed=HLinkPanda';"
                    alt="">
        </div>

        <div class="career-welcome-bubble career-reveal career-reveal--intro">
            <span><strong>처음</strong>이신가요? 딱 맞는 학습 순서를 정리해 드릴게요.</span>
        </div>
    </div>

    <section class="career-welcome-hero">
        <h1>
            나를 위해 초개인화된 단 하나의 교육 로드맵으로,<br>
            앞서가는 능력자가 되어보세요.
        </h1>
    </section>

    <section class="career-feature-list" aria-label="커리어패스 주요 기능">
        <article class="career-feature-card career-reveal">
            <img th:src="@{/images/career-path/welcome/welcome_1.webp}"
                 alt="AI 기반 커리어 진단 화면">
        </article>
        <article class="career-feature-card career-reveal">
            <img th:src="@{/images/career-path/welcome/welcome_2.webp}"
                 alt="개인 맞춤 학습 로드맵 화면">
        </article>
        <article class="career-feature-card career-reveal">
            <img th:src="@{/images/career-path/welcome/welcome_3.webp}"
                 alt="커리어 성장 경로 추천 화면">
        </article>
    </section>

    <div class="career-welcome-action">
        <a th:href="@{/courses/career-path/start}" class="btn-start-diagnosis">
            진단 지금 바로 시작하기
        </a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    const careerRevealItems = document.querySelectorAll('.career-reveal');

    if ('IntersectionObserver' in window) {
        const careerRevealObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (!entry.isIntersecting) {
                    return;
                }

                entry.target.classList.add('is-visible');
                careerRevealObserver.unobserve(entry.target);
            });
        }, { threshold: 0.18 });

        careerRevealItems.forEach((element) => {
            careerRevealObserver.observe(element);
        });
    } else {
        careerRevealItems.forEach((element) => element.classList.add('is-visible'));
    }
</script>
</body>
</html>
