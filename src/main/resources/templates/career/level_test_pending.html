<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI 시험지 생성 중 - H-Link</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/career.css}">
    <link rel="stylesheet" th:href="@{/css/career-path/career_pending.css}">
</head>
<body class="career-pending-page">
<div th:replace="~{fragments/header :: header}"></div>

<!-- 상단 스텝 프로그레스 바 -->
<div class="career-progress-bar">
    <div class="progress-step completed">
        <span class="step-num">✓</span>
        <span class="step-label">목표/스택 설정</span>
    </div>
    <div class="progress-line active"></div>
    <div class="progress-step active">
        <span class="step-num">2</span>
        <span class="step-label">AI 시험지 생성</span>
    </div>
    <div class="progress-line"></div>
    <div class="progress-step">
        <span class="step-num">3</span>
        <span class="step-label">레벨 테스트</span>
    </div>
    <div class="progress-line"></div>
    <div class="progress-step">
        <span class="step-num">4</span>
        <span class="step-label">역량 & 강의 분석</span>
    </div>
</div>

<main class="career-pending-container">
    <div class="pending-card">
        <!-- 중앙 문구 및 로딩 애니메이션 -->
        <h1 class="pending-title" aria-live="polite">테스트 문항을 구성하고 있습니다.</h1>
        
        <div class="pending-lottie" aria-hidden="true">
            <lottie-player th:src="@{/lottie/ai-generate.json}"
                           src="/lottie/ai-generate.json"
                           background="transparent"
                           speed="1"
                           loop
                           autoplay>
            </lottie-player>
        </div>

        <!-- 하단 생성 조건 -->
        <div class="generation-condition-box">
            <div class="condition-header">진단 기준</div>
            <div class="condition-divider" aria-hidden="true"></div>
            <div class="condition-grid">
                <div class="condition-item">
                    <span class="condition-label">목표 수준</span>
                    <span class="condition-value" th:text="${difficulty == '상' ? '실무 심화형' : (difficulty == '하' ? '기초 입문형' : '실무 성장형')}">실무 성장형</span>
                </div>
                <div class="condition-item">
                    <span class="condition-label">난이도</span>
                    <span class="condition-value" th:text="${difficulty == '상' ? '고급' : (difficulty == '하' ? '초급' : '중급')}">중급</span>
                </div>
                <div class="condition-item">
                    <span class="condition-label">진단 방식</span>
                    <span class="condition-value" th:text="${mode}">표준 진단</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 다음 단계 연결 시뮬레이션용 가이드 (실무 환경 개발용) -->
    <div class="pending-simulation-guide" style="display: none;">
        <p>💡 AI 출제 서비스(다음 이슈 개발 사항)와 연계될 영역입니다. 현재 테스트를 위해 4초 후 대시보드로 자동 리다이렉트됩니다.</p>
        <a th:href="@{/courses/career-path/dashboard}" class="btn-simulation-dashboard">즉시 대시보드로 이동</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const diagnosisId = /*[[${diagnosisId}]]*/ 0;
    /*]]>*/
</script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<script th:src="@{/js/career-pending.js}"></script>
</body>
</html>
