<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - H-Links</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page">
<main class="auth-card">
    <section class="auth-form-section" aria-label="로그인">
        <div class="auth-form-container">
            <header class="auth-header">
                <h1 class="auth-title" aria-label="H-Links">
                    <span class="auth-title__accent">H</span>-Links
                </h1>
                <p class="auth-description">Sign in with your employee number and password.</p>
            </header>

            <p class="auth-alert auth-alert--danger" th:if="${param.error}" role="alert">사번 또는 비밀번호가 올바르지 않습니다.</p>
            <p class="auth-alert auth-alert--success" th:if="${param.logout}">로그아웃되었습니다.</p>

            <form class="auth-form" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="auth-field">
                    <label class="auth-label" for="loginId">사번</label>
                    <input class="auth-input" id="loginId" name="loginId" type="text" autocomplete="username" placeholder="사원번호" required>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">비밀번호</label>
                    <input class="auth-input" id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>
                </div>

                <button class="auth-submit" type="submit">Login</button>
            </form>
        </div>
    </section>

    <section class="auth-visual-section" aria-label="H-Links 소개 이미지">
        <div class="auth-visual">
            <div class="auth-visual__overlay">
                <span class="auth-visual__eyebrow">Hyundai Futurenet</span>
                <strong class="auth-visual__title">Build your next career path.</strong>
            </div>
        </div>
    </section>
</main>
<script>
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
</body>
</html>
