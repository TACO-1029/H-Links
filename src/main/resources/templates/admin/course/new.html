<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강의 등록 - H-Links</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <style>
        body {
            background: var(--color-bg-soft);
        }

        .admin-course-shell {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .admin-course-title {
            margin: 0 0 24px;
            color: var(--color-text-primary);
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
        }

        .admin-course-form {
            display: grid;
            gap: 20px;
            padding: 32px;
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            background: var(--color-bg-surface);
            box-shadow: var(--shadow-sm);
        }

        .admin-course-field {
            display: grid;
            gap: 8px;
        }

        .admin-course-label {
            color: var(--color-text-primary);
            font-size: var(--text-sm);
            font-weight: var(--font-bold);
        }

        .admin-course-input,
        .admin-course-select,
        .admin-course-textarea {
            width: 100%;
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            color: var(--color-text-primary);
            background: var(--color-bg-surface);
            font: inherit;
        }

        .admin-course-textarea {
            min-height: 140px;
            resize: vertical;
        }

        .admin-course-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .admin-course-chapter-list {
            display: grid;
            gap: 14px;
        }

        .admin-course-chapter {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr) auto;
            gap: 12px;
            align-items: end;
            padding: 16px;
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            background: var(--color-bg-soft);
        }

        .admin-course-button {
            min-height: 44px;
            padding: 0 20px;
            border: 0;
            border-radius: var(--radius-md);
            background: var(--color-brand);
            color: var(--color-text-inverse);
            font-weight: var(--font-bold);
            cursor: pointer;
        }

        .admin-course-add-button,
        .admin-course-remove-button {
            min-height: 40px;
            border-radius: var(--radius-md);
            font-weight: var(--font-bold);
            cursor: pointer;
        }

        .admin-course-add-button {
            width: 44px;
            height: 44px;
            min-height: 44px;
            padding: 0;
            justify-self: center;
            border: 1px solid var(--color-border-brand);
            background: var(--color-bg-surface);
            color: var(--color-brand);
            font-size: var(--text-2xl);
            line-height: 1;
        }

        .admin-course-add-button:hover {
            background: var(--color-brand);
            color: var(--color-text-inverse);
        }

        .admin-course-remove-button {
            padding: 0 14px;
            border: 1px solid var(--color-border-default);
            background: var(--color-bg-surface);
            color: var(--color-text-secondary);
        }

        @media (max-width: 768px) {
            .admin-course-chapter {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="admin-course-shell">
    <h1 class="admin-course-title">강의 등록</h1>

    <form class="admin-course-form"
          th:action="@{/admin/courses}"
          th:object="${courseForm}"
          method="post"
          enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label class="admin-course-field">
            <span class="admin-course-label">강의명</span>
            <input class="admin-course-input" type="text" th:field="*{courseTitle}" required>
        </label>

        <label class="admin-course-field">
            <span class="admin-course-label">설명</span>
            <textarea class="admin-course-textarea" th:field="*{description}" required></textarea>
        </label>

        <label class="admin-course-field">
            <span class="admin-course-label">카테고리</span>
            <select class="admin-course-select" th:field="*{categoryType}" required>
                <option value="">선택</option>
                <option value="CAREER_PATH">커리어패스</option>
                <option value="CAREER_HIGH">커리어하이</option>
            </select>
        </label>

        <label class="admin-course-field">
            <span class="admin-course-label">강사명</span>
            <input class="admin-course-input" type="text" th:field="*{instructorName}" required>
        </label>

        <div class="admin-course-field">
            <span class="admin-course-label">강의 챕터</span>
            <div class="admin-course-chapter-list" id="chapterFields">
                <div class="admin-course-chapter">
                    <label class="admin-course-field">
                        <span class="admin-course-label">챕터명</span>
                        <input class="admin-course-input" type="text" name="chapterTitles" required>
                    </label>
                    <label class="admin-course-field">
                        <span class="admin-course-label">mp4 영상 파일</span>
                        <input class="admin-course-input" type="file" name="videoFiles" accept="video/mp4,.mp4" required>
                    </label>
                    <button class="admin-course-remove-button" type="button" data-remove-chapter>삭제</button>
                </div>
            </div>
            <button class="admin-course-add-button" type="button" id="addChapterButton" aria-label="챕터 추가">+</button>
        </div>

        <div class="admin-course-actions">
            <button class="admin-course-button" type="submit">등록</button>
        </div>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    const chapterFields = document.getElementById('chapterFields');
    const addChapterButton = document.getElementById('addChapterButton');

    function updateRemoveButtons() {
        const removeButtons = chapterFields.querySelectorAll('[data-remove-chapter]');
        removeButtons.forEach((button) => {
            button.disabled = removeButtons.length === 1;
        });
    }

    addChapterButton.addEventListener('click', () => {
        const firstChapter = chapterFields.querySelector('.admin-course-chapter');
        const nextChapter = firstChapter.cloneNode(true);

        nextChapter.querySelectorAll('input').forEach((input) => {
            input.value = '';
        });

        chapterFields.appendChild(nextChapter);
        updateRemoveButtons();
    });

    chapterFields.addEventListener('click', (event) => {
        const removeButton = event.target.closest('[data-remove-chapter]');

        if (!removeButton || chapterFields.children.length === 1) {
            return;
        }

        removeButton.closest('.admin-course-chapter').remove();
        updateRemoveButtons();
    });

    updateRemoveButtons();
</script>
</body>
</html>
