<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${result.chapterTitle} + ' 퀴즈 결과'">퀴즈 결과</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-chapter.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #F4F6F8;
            color: #0F172A;
        }

        .result-shell {
            max-width: 920px;
            padding: 36px 24px 80px;
        }

        .result-summary {
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);
        }

        .result-summary__eyebrow {
            color: #009E7A;
            font-size: 13px;
            font-weight: 900;
        }

        .result-summary h1 {
            color: #111827;
            font-size: 28px;
            line-height: 1.3;
            font-weight: 900;
        }

        .result-score {
            color: #009E7A;
            font-size: 18px;
            font-weight: 900;
        }

        .result-card {
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);
        }

        .result-card.is-correct {
            border-color: #A7F3D0;
        }

        .result-card.is-wrong {
            border-color: #FECDD3;
        }

        .result-number {
            min-width: 34px;
            height: 20px;
            padding: 0 8px;
            border-radius: 5px;
            background: #00A884;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 900;
            line-height: 20px;
            text-align: center;
        }

        .result-question {
            color: #111827;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.55;
        }

        .result-answer {
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: #FFFFFF;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.5;
        }

        .result-answer strong {
            color: #111827;
            font-weight: 900;
        }

        .result-answer--correct {
            border-color: rgba(0, 168, 132, 0.28);
            background: #EFFFFA;
        }

        .result-explanation {
            border-radius: 10px;
            background: #F8FAFC;
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
        }

        .badge-result {
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
        }

        @media (max-width: 640px) {
            .result-shell {
                padding: 24px 14px 56px;
            }

            .result-summary h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="result-shell container">
    <a th:href="@{/courses/{courseId}(courseId=${result.courseId})}" class="chapter-back">
        <i class="fa-solid fa-chevron-left"></i>
        강의 상세로 돌아가기
    </a>

    <header class="result-summary card mb-4">
        <div class="card-body p-4 p-md-5">
            <p class="result-summary__eyebrow mb-2" th:text="${result.courseTitle}">강의명</p>
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3">
                <div>
                    <h1 class="mb-2" th:text="${result.chapterTitle} + ' 퀴즈 결과'">퀴즈 결과</h1>
                    <p class="mb-0 text-secondary fw-bold">퀴즈 제출이 완료되어 해당 챕터가 수강 완료 처리되었습니다.</p>
                </div>
                <div class="result-score"
                     th:text="${result.correctCount} + ' / ' + ${result.totalCount} + ' 정답'">
                    2 / 3 정답
                </div>
            </div>
        </div>
    </header>

    <section class="d-grid gap-4" aria-label="문항별 결과">
        <article class="result-card card"
                 th:each="item, stat : ${result.items}"
                 th:classappend="${item.correct} ? ' is-correct' : ' is-wrong'">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                    <div class="d-flex align-items-start gap-2">
                        <span class="result-number" th:text="'Q ' + ${#numbers.formatInteger(stat.count, 2)}">Q 01</span>
                        <p class="result-question mb-0" th:text="${item.questionText}">문항</p>
                    </div>
                    <span class="badge badge-result"
                          th:classappend="${item.correct} ? ' text-bg-success' : ' text-bg-danger'"
                          th:text="${item.correct} ? '정답' : '오답'">정답</span>
                </div>

                <div class="d-grid gap-2">
                    <div class="result-answer p-3">
                        내가 선택한 답:
                        <strong th:text="${item.selectedOptionText != null ? item.selectedOptionText : '미선택'}">선택 답안</strong>
                    </div>
                    <div class="result-answer result-answer--correct p-3">
                        정답:
                        <strong th:text="${item.correctOptionText != null ? item.correctOptionText : '-'}">정답</strong>
                    </div>
                </div>

                <div class="result-explanation mt-3 p-3"
                     th:if="${item.explanation != null and !#strings.isEmpty(item.explanation)}"
                     th:text="${item.explanation}">
                    해설
                </div>
            </div>
        </article>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
