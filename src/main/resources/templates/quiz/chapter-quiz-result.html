<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${result.chapterTitle} + ' 퀴즈 결과'">퀴즈 결과</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-chapter.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #F8FAFC; color: #0F172A; }
        .result-shell { max-width: 900px; margin: 0 auto; padding: 32px 24px 72px; }
        .result-header { margin-bottom: 24px; padding: 28px; border-radius: 16px; background: #FFFFFF; border: 1px solid #E2E8F0; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06); }
        .result-header__eyebrow { margin: 0 0 8px; color: #009E7A; font-size: 13px; font-weight: 900; }
        .result-header h1 { margin: 0 0 12px; font-size: 30px; }
        .result-score { margin: 0; color: #0F172A; font-size: 18px; font-weight: 900; }
        .result-list { display: grid; gap: 16px; }
        .result-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px; padding: 24px; }
        .result-card.is-correct { border-color: #A7F3D0; }
        .result-card.is-wrong { border-color: #FECDD3; }
        .result-badge { display: inline-flex; margin-bottom: 12px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 900; }
        .result-badge--correct { background: #ECFDF5; color: #047857; }
        .result-badge--wrong { background: #FFF1F2; color: #E11D48; }
        .result-question { margin: 0 0 16px; font-size: 17px; font-weight: 900; line-height: 1.55; }
        .result-row { margin: 8px 0; color: #475569; font-size: 14px; font-weight: 700; }
        .result-row strong { color: #0F172A; }
        .result-explanation { margin: 16px 0 0; padding: 14px 16px; border-radius: 12px; background: #F8FAFC; color: #475569; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="result-shell">
    <a th:href="@{/courses/{courseId}(courseId=${result.courseId})}" class="chapter-back">
        <i class="fa-solid fa-chevron-left"></i>
        강의 상세로 돌아가기
    </a>

    <header class="result-header">
        <p class="result-header__eyebrow" th:text="${result.courseTitle}">강의명</p>
        <h1 th:text="${result.chapterTitle} + ' 퀴즈 결과'">퀴즈 결과</h1>
        <p class="result-score"
           th:text="${result.correctCount} + ' / ' + ${result.totalCount} + ' 정답'">
            2 / 3 정답
        </p>
    </header>

    <section class="result-list" aria-label="문항별 결과">
        <article class="result-card"
                 th:each="item, stat : ${result.items}"
                 th:classappend="${item.correct} ? ' is-correct' : ' is-wrong'">
            <span class="result-badge"
                  th:classappend="${item.correct} ? ' result-badge--correct' : ' result-badge--wrong'"
                  th:text="${item.correct} ? '정답' : '오답'">정답</span>
            <p class="result-question" th:text="'Q' + ${stat.count} + '. ' + ${item.questionText}">문항</p>
            <p class="result-row">
                내가 선택한 답:
                <strong th:text="${item.selectedOptionText != null ? item.selectedOptionText : '미선택'}">선택 답안</strong>
            </p>
            <p class="result-row">
                정답:
                <strong th:text="${item.correctOptionText != null ? item.correctOptionText : '-'}">정답</strong>
            </p>
            <p class="result-explanation"
               th:if="${item.explanation != null and !#strings.isEmpty(item.explanation)}"
               th:text="${item.explanation}">
                해설
            </p>
        </article>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
