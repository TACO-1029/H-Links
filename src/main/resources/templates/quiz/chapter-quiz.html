<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quizPage.chapterTitle} + ' 퀴즈'">챕터 퀴즈</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-chapter.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #F4F6F8;
            color: #3B4043;
        }

        .quiz-shell {
            max-width: 920px;
            margin: 0 auto;
            padding: 36px 24px 80px;
        }

        .quiz-header {
            margin-bottom: 22px;
        }

        .quiz-header__eyebrow {
            margin: 0 0 8px;
            color: #009E7A;
            font-size: 13px;
            font-weight: 900;
        }

        .quiz-header h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.3;
            font-weight: 900;
        }

        .quiz-form {
            display: grid;
            gap: 24px;
        }

        .quiz-card {
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);
        }

        .quiz-card__body {
            padding: 30px;
        }

        .quiz-card__head {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
        }

        .quiz-card__number {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 20px;
            padding: 0 8px;
            border-radius: 5px;
            background: #00A884;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
        }

        .quiz-card__question {
            margin: 0;
            color: #111827;
            font-size: 15px;
            font-weight: 900;
            line-height: 1.55;
        }

        .quiz-options {
            display: grid;
            gap: 12px;
            padding-left: 40px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 46px;
            padding: 0 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: #FFFFFF;
            color: #334155;
            cursor: pointer;
            transition: border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
        }

        .quiz-option:hover {
            border-color: rgba(0, 158, 122, 0.38);
            background: #F8FFFC;
        }

        .quiz-option:has(.form-check-input:checked) {
            border-color: #00A884;
            background: #EFFFFA;
            box-shadow: 0 0 0 1px rgba(0, 168, 132, 0.18);
            color: #008768;
        }

        .quiz-option__text {
            min-width: 0;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.5;
        }

        .quiz-option .form-check-input {
            flex: 0 0 auto;
            width: 18px;
            height: 18px;
            margin: 0;
            border-color: #CBD5E1;
            cursor: pointer;
        }

        .quiz-option .form-check-input:checked {
            background-color: #00A884;
            border-color: #00A884;
        }

        .quiz-option .form-check-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 168, 132, 0.14);
        }

        .quiz-submit {
            min-height: 52px;
            border-radius: 999px;
            background: #009E7A;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 900;
        }

        .quiz-submit:hover {
            background: #008768;
            color: #FFFFFF;
        }

        @media (max-width: 640px) {
            .quiz-shell {
                padding: 24px 14px 56px;
            }

            .quiz-card__body {
                padding: 22px 16px;
            }

            .quiz-card__head {
                flex-direction: column;
            }

            .quiz-options {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="quiz-shell container">
    <a th:href="@{/courses/{courseId}(courseId=${quizPage.courseId})}" class="chapter-back">
        <i class="fa-solid fa-chevron-left"></i>
        강의 상세로 돌아가기
    </a>

    <header class="quiz-header">
        <p class="quiz-header__eyebrow" th:text="${quizPage.courseTitle}">강의명</p>
        <h1 th:text="${quizPage.chapterTitle} + ' 퀴즈'">챕터 퀴즈</h1>
    </header>

    <form class="quiz-form"
          th:action="@{/courses/{courseId}/chapters/{chapterId}/quiz(courseId=${quizPage.courseId}, chapterId=${quizPage.chapterId})}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <article class="quiz-card card" th:each="question, stat : ${quizPage.questions}">
            <div class="quiz-card__body card-body">
                <div class="quiz-card__head">
                    <span class="quiz-card__number" th:text="'Q ' + ${#numbers.formatInteger(stat.count, 2)}">Q 01</span>
                    <p class="quiz-card__question" th:text="${question.questionText}">문항</p>
                </div>

                <div class="quiz-options">
                    <label class="quiz-option" th:each="option, optionStat : ${question.options}">
                        <span class="quiz-option__text">
                            <span th:text="${optionStat.count} + '. '">1. </span>
                            <span th:text="${option.optionText}">보기</span>
                        </span>
                        <input class="form-check-input"
                               type="radio"
                               th:name="${'answers[' + question.quizId + ']'}"
                               th:value="${option.optionId}"
                               required>
                    </label>
                </div>
            </div>
        </article>

        <button class="quiz-submit btn" type="submit">제출하기</button>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
