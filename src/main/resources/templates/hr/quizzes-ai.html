<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 생성 퀴즈 | H-Links</title>
  <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/hr-quiz.css}">
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell hr-shell">
  <div class="hr-layout">
    <div th:replace="~{fragments/hr-sidebar :: sidebar('ai-quiz')}"></div>

    <section class="hr-quiz-panel" aria-labelledby="aiQuizTitle">
      <div class="hr-quiz-panel__header">
        <div>
          <p class="hr-quiz-panel__eyebrow">퀴즈 관리</p>
          <h1 class="hr-quiz-panel__title" id="aiQuizTitle">AI 생성 퀴즈</h1>
          <p class="hr-quiz-panel__description">강의 자막을 기반으로 생성된 퀴즈와 생성 상태를 확인합니다.</p>
        </div>
        <span class="hr-quiz-panel__count" th:text="|총 ${totalCount}개|">총 0개</span>
      </div>

      <form class="hr-quiz-filter" th:action="@{/hr/quizzes/ai}" method="get">
        <input type="hidden" name="size" th:value="${pageSize}">
        <label class="hr-quiz-filter__field">
          <span class="hr-quiz-filter__label">강의명</span>
          <select class="form-select hlinks-dropdown" name="course">
            <option value="">전체 강의</option>
            <option th:each="courseOption : ${courseOptions}"
                    th:value="${courseOption}"
                    th:text="${courseOption}"
                    th:selected="${courseOption == courseFilter}">강의명</option>
          </select>
        </label>
        <label class="hr-quiz-filter__field">
          <span class="hr-quiz-filter__label">생성 상태</span>
          <select class="form-select hlinks-dropdown" name="status">
            <option value="">전체 생성 상태</option>
            <option th:each="statusOption : ${statusOptions}"
                    th:value="${statusOption}"
                    th:text="${statusOption}"
                    th:selected="${statusOption == statusFilter}">상태</option>
          </select>
        </label>
        <label class="hr-quiz-filter__field">
          <span class="hr-quiz-filter__label">검색</span>
          <input class="hr-quiz-filter__input hlinks-input"
                 type="search"
                 name="keyword"
                 th:value="${keyword}"
                 placeholder="퀴즈, 강의명, 챕터명 검색">
        </label>
        <button class="hr-quiz-filter__button" type="submit">조회</button>
      </form>

      <div class="admin-table-card" th:if="${!#lists.isEmpty(quizzes)}">
        <div class="admin-table-wrap">
          <table class="table table-hover align-middle admin-table hr-quiz-table">
            <colgroup>
              <col class="hr-quiz-table__col-source">
              <col class="hr-quiz-table__col-question">
              <col class="hr-quiz-table__col-difficulty">
              <col class="hr-quiz-table__col-status">
              <col class="hr-quiz-table__col-date">
            </colgroup>
            <thead>
            <tr>
              <th scope="col">출처</th>
              <th scope="col">퀴즈</th>
              <th scope="col">난이도</th>
              <th scope="col">생성 상태</th>
              <th scope="col">생성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="quiz : ${quizzes}"
                th:classappend="${quiz.quizId != null} ? ' is-clickable'"
                th:data-quiz-id="${quiz.quizId}"
                th:tabindex="${quiz.quizId != null} ? '0'">
              <td>
                <div class="hr-quiz-table__source">
                  <strong class="hr-quiz-table__source-title"
                          th:text="${quiz.courseTitle != null ? quiz.courseTitle : '-'}">강의명</strong>
                  <span class="hr-quiz-table__chapter-badge"
                        th:text="${quiz.chapterTitle != null ? quiz.chapterTitle : '-'}">챕터명</span>
                </div>
              </td>
              <td>
                <div class="hr-quiz-table__question">
                  <strong th:text="${quiz.displayQuestionText}">퀴즈 질문</strong>
                  <span class="hr-quiz-table__meta" th:text="${quiz.questionTypeLabel}">객관식</span>
                </div>
              </td>
              <td>
                <span class="admin-table-badge" th:text="${quiz.difficultyLabel}">보통</span>
              </td>
              <td>
                <span class="admin-table-badge admin-table-status hr-quiz-table__status"
                      th:classappend="${quiz.quizBuildStatus == 'COMPLETED'} ? ' success' : (${quiz.quizBuildStatus == 'FAILED'} ? ' fail' : ' pending')"
                      th:text="${quiz.buildStatusLabel}">생성 완료</span>
              </td>
              <td>
                <span class="hr-quiz-table__text"
                      th:text="${quiz.sortAt != null ? #temporals.format(quiz.sortAt, 'yyyy.MM.dd HH:mm') : '-'}">
                  2026.01.01 10:00
                </span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="hr-quiz-pagination hlinks-pagination" th:if="${totalPages > 1}">
          <nav aria-label="AI 생성 퀴즈 페이지">
            <ul class="pagination hr-quiz-pagination__nav justify-content-center mb-0">
              <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/hr/quizzes/ai(page=${currentPage - 1}, size=${pageSize}, course=${courseFilter}, status=${statusFilter}, keyword=${keyword})}"
                   aria-label="이전 페이지">
                  <i class="bi bi-chevron-left" aria-hidden="true"></i>
                </a>
              </li>
              <li class="page-item"
                  th:each="pageItem : ${pageItems}"
                  th:classappend="${pageItem.active} ? ' active' : (${pageItem.ellipsis} ? ' disabled' : '')">
                <span class="page-link"
                      th:if="${pageItem.ellipsis}"
                      th:text="${pageItem.label}">...</span>
                <a class="page-link"
                   th:unless="${pageItem.ellipsis}"
                   th:href="@{/hr/quizzes/ai(page=${pageItem.page}, size=${pageSize}, course=${courseFilter}, status=${statusFilter}, keyword=${keyword})}"
                   th:text="${pageItem.label}">1</a>
              </li>
              <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/hr/quizzes/ai(page=${currentPage + 1}, size=${pageSize}, course=${courseFilter}, status=${statusFilter}, keyword=${keyword})}"
                   aria-label="다음 페이지">
                  <i class="bi bi-chevron-right" aria-hidden="true"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>

      <div class="hr-quiz-empty" th:if="${#lists.isEmpty(quizzes)}">
        <div>
          <strong>생성된 AI 퀴즈가 없습니다.</strong>
          <p>강의 챕터의 퀴즈 생성이 완료되면 이곳에서 확인할 수 있습니다.</p>
        </div>
      </div>
    </section>
  </div>
</main>

<div class="hr-quiz-modal" id="quizDetailModal" hidden>
  <div class="hr-quiz-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="quizDetailTitle">
    <div class="hr-quiz-modal__header">
      <div>
        <p class="hr-quiz-modal__eyebrow" id="quizDetailStatus">퀴즈 생성완료</p>
        <h2 class="hr-quiz-modal__title" id="quizDetailTitle">퀴즈 상세</h2>
        <p class="hr-quiz-modal__meta" id="quizDetailMeta">강의명 · 챕터명</p>
      </div>
      <button class="hr-quiz-modal__close" type="button" data-quiz-modal-close aria-label="닫기">×</button>
    </div>

    <div class="hr-quiz-modal__body">
      <section class="hr-quiz-modal__question-card">
        <div class="hr-quiz-modal__question-head">
          <span class="hr-quiz-modal__q-number">Q1</span>
          <p class="hr-quiz-modal__question" id="quizDetailQuestion">퀴즈 질문</p>
        </div>
        <ol class="hr-quiz-modal__options" id="quizDetailOptions"></ol>
      </section>

      <section class="hr-quiz-modal__explanation">
        <div class="hr-quiz-modal__explanation-head">
          <span class="hr-quiz-modal__explanation-badge">해설</span>
          <span class="hr-quiz-modal__answer" id="quizDetailAnswer">정답</span>
        </div>
        <p class="hr-quiz-modal__explanation-text" id="quizDetailExplanation">해설 내용</p>
      </section>
    </div>

    <div class="hr-quiz-modal__footer">
      <button class="hr-quiz-modal__confirm" type="button" data-quiz-modal-close>확인하고 닫기</button>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
  const quizDetailModal = document.getElementById('quizDetailModal');
  const quizDetailStatus = document.getElementById('quizDetailStatus');
  const quizDetailTitle = document.getElementById('quizDetailTitle');
  const quizDetailMeta = document.getElementById('quizDetailMeta');
  const quizDetailQuestion = document.getElementById('quizDetailQuestion');
  const quizDetailOptions = document.getElementById('quizDetailOptions');
  const quizDetailAnswer = document.getElementById('quizDetailAnswer');
  const quizDetailExplanation = document.getElementById('quizDetailExplanation');

  function formatQuestionType(questionType) {
    if (questionType === 'MULTIPLE_CHOICE') {
      return '객관식';
    }

    return '퀴즈';
  }

  function formatDateTime(value) {
    if (!value) {
      return '-';
    }

    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
      return '-';
    }

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');

    return `${year}.${month}.${day}`;
  }

  function renderQuizOptions(options = []) {
    quizDetailOptions.replaceChildren();

    options.forEach((option) => {
      const item = document.createElement('li');
      const isCorrect = option.correctYn === 'Y';
      item.className = `hr-quiz-modal__option${isCorrect ? ' is-correct' : ''}`;

      const text = document.createElement('span');
      text.textContent = `${option.optionNo}. ${option.optionText}`;

      const mark = document.createElement('span');
      mark.className = 'hr-quiz-modal__mark';
      mark.textContent = isCorrect ? '✓' : '';
      mark.setAttribute('aria-hidden', 'true');

      item.appendChild(text);
      item.appendChild(mark);
      quizDetailOptions.appendChild(item);
    });
  }

  function openQuizModal(quiz) {
    quizDetailStatus.textContent = '퀴즈 생성완료';
    quizDetailTitle.textContent = quiz.questionText || '퀴즈 상세';
    quizDetailMeta.textContent = `${formatQuestionType(quiz.questionType)} · 제출일 ${formatDateTime(quiz.createdAt)}`;
    quizDetailQuestion.textContent = quiz.questionText || '-';
    quizDetailAnswer.textContent = quiz.answerText ? `정답 ${quiz.answerText}` : '정답';
    quizDetailExplanation.textContent = quiz.explanation || '등록된 해설이 없습니다.';
    renderQuizOptions(quiz.options || []);
    quizDetailModal.hidden = false;
    document.body.style.overflow = 'hidden';
    quizDetailModal.querySelector('[data-quiz-modal-close]').focus();
  }

  function closeQuizModal() {
    quizDetailModal.hidden = true;
    document.body.style.overflow = '';
  }

  async function fetchQuizDetail(quizId) {
    const response = await fetch(`/api/quizzes/${quizId}`, {
      method: 'GET',
      credentials: 'same-origin',
      headers: {
        'Accept': 'application/json'
      }
    });

    if (!response.ok) {
      throw new Error('퀴즈 상세를 불러오지 못했습니다.');
    }

    const payload = await response.json();
    return payload.data;
  }

  async function handleQuizRowClick(row) {
    const quizId = row.dataset.quizId;

    if (!quizId) {
      return;
    }

    try {
      const quiz = await fetchQuizDetail(quizId);
      openQuizModal(quiz);
    } catch (error) {
      window.alert(error.message);
    }
  }

  document.querySelectorAll('.hr-quiz-table tbody tr[data-quiz-id]').forEach((row) => {
    row.addEventListener('click', () => handleQuizRowClick(row));
    row.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        handleQuizRowClick(row);
      }
    });
  });

  quizDetailModal.addEventListener('click', (event) => {
    if (event.target === quizDetailModal || event.target.closest('[data-quiz-modal-close]')) {
      closeQuizModal();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && !quizDetailModal.hidden) {
      closeQuizModal();
    }
  });
</script>
</body>
</html>
