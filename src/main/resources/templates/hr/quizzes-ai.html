<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 생성 퀴즈 | H-Links</title>
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <style>
    .hr-dashboard {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 28px;
      width: min(100%, 1440px);
      margin: 0 auto;
      padding: 40px 64px 80px;
    }

    .hr-sidebar {
      align-self: start;
      padding: 20px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      background: var(--color-bg-surface);
    }

    .hr-sidebar__title {
      margin: 0 0 18px;
      color: var(--color-text-primary);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
    }

    .hr-nav,
    .hr-nav__group {
      display: grid;
      gap: 8px;
    }

    .hr-nav {
      gap: 22px;
    }

    .hr-nav__heading {
      margin: 0 0 4px;
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .hr-nav__link {
      display: flex;
      align-items: center;
      min-height: 34px;
      padding: 0 10px;
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      text-decoration: none;
    }

    .hr-nav__link:hover,
    .hr-nav__link.is-active {
      background: var(--color-bg-soft);
      color: var(--color-brand);
    }

    .hr-quiz-panel {
      display: grid;
      gap: 20px;
      min-width: 0;
    }

    .hr-quiz-panel__header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 4px;
    }

    .hr-quiz-panel__eyebrow {
      margin: 0 0 8px;
      color: var(--color-brand);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .hr-quiz-panel__title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: var(--text-3xl);
      font-weight: var(--font-bold);
      letter-spacing: 0;
    }

    .hr-quiz-panel__description {
      margin: 10px 0 0;
      color: var(--color-text-secondary);
      font-size: var(--text-base);
    }

    .hr-quiz-panel__count {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-full);
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      white-space: nowrap;
    }

    .hr-quiz-table-card {
      overflow: hidden;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      background: var(--color-bg-surface);
      box-shadow: var(--shadow-sm);
    }

    .hr-quiz-table-wrap {
      overflow-x: auto;
    }

    .hr-quiz-table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    .hr-quiz-table th,
    .hr-quiz-table td {
      padding: 16px;
      border-bottom: 1px solid var(--color-border-default);
      text-align: left;
      vertical-align: top;
    }

    .hr-quiz-table th {
      background: var(--color-bg-soft);
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
    }

    .hr-quiz-table tr:last-child td {
      border-bottom: 0;
    }

    .hr-quiz-table__question {
      display: grid;
      gap: 8px;
      max-width: 420px;
    }

    .hr-quiz-table__question strong {
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      line-height: 1.5;
    }

    .hr-quiz-table__meta {
      color: var(--color-text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
    }

    .hr-quiz-table__text {
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      line-height: 1.5;
    }

    .hr-quiz-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-full);
      background: var(--color-bg-soft);
      color: var(--color-text-primary);
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      white-space: nowrap;
    }

    .hr-quiz-badge--status {
      background: var(--color-bg-soft);
      color: var(--color-brand);
    }

    .hr-quiz-empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      padding: 48px 24px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      background: var(--color-bg-surface);
      text-align: center;
    }

    .hr-quiz-empty strong {
      color: var(--color-text-primary);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
    }

    .hr-quiz-empty p {
      margin: 10px 0 0;
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
    }

    @media (max-width: 1024px) {
      .hr-dashboard {
        grid-template-columns: 1fr;
        padding: 32px 24px 64px;
      }

      .hr-sidebar {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .hr-quiz-panel__header {
        align-items: flex-start;
        flex-direction: column;
      }

      .hr-quiz-panel__count {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell">
  <div class="hr-dashboard">
    <aside class="hr-sidebar" aria-label="HR 관리 메뉴">
      <h2 class="hr-sidebar__title">Dashboard</h2>
      <nav class="hr-nav">
        <div class="hr-nav__group">
          <p class="hr-nav__heading">강의 관리</p>
          <a class="hr-nav__link" th:href="@{/courses}">강의 목록</a>
          <a class="hr-nav__link" th:href="@{/hr}">강의 등록</a>
        </div>
        <div class="hr-nav__group">
          <p class="hr-nav__heading">퀴즈 관리</p>
          <a class="hr-nav__link is-active" th:href="@{/hr/quizzes/ai}">AI 생성 퀴즈</a>
          <a class="hr-nav__link" href="#">승인된 퀴즈</a>
        </div>
        <div class="hr-nav__group">
          <p class="hr-nav__heading">신청 관리</p>
          <a class="hr-nav__link" href="#">수강 신청 현황</a>
          <a class="hr-nav__link" href="#">수료 현황</a>
        </div>
        <div class="hr-nav__group">
          <p class="hr-nav__heading">통계</p>
          <a class="hr-nav__link" href="#">학습 통계</a>
          <a class="hr-nav__link" href="#">강의 통계</a>
        </div>
      </nav>
    </aside>

    <section class="hr-quiz-panel" aria-labelledby="aiQuizTitle">
      <div class="hr-quiz-panel__header">
        <div>
          <p class="hr-quiz-panel__eyebrow">퀴즈 관리</p>
          <h1 class="hr-quiz-panel__title" id="aiQuizTitle">AI 생성 퀴즈</h1>
          <p class="hr-quiz-panel__description">강의 transcript 기반으로 생성된 퀴즈 후보를 확인합니다.</p>
        </div>
        <span class="hr-quiz-panel__count" th:text="|총 ${#lists.size(quizzes)}개|">총 0개</span>
      </div>

      <div class="hr-quiz-table-card" th:if="${!#lists.isEmpty(quizzes)}">
        <div class="hr-quiz-table-wrap">
          <table class="hr-quiz-table">
            <thead>
            <tr>
              <th scope="col">퀴즈</th>
              <th scope="col">강의</th>
              <th scope="col">챕터</th>
              <th scope="col">난이도</th>
              <th scope="col">상태</th>
              <th scope="col">생성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="quiz : ${quizzes}">
              <td>
                <div class="hr-quiz-table__question">
                  <strong th:text="${quiz.displayQuestionText}">퀴즈 질문</strong>
                  <span class="hr-quiz-table__meta" th:text="${quiz.questionTypeLabel}">객관식</span>
                </div>
              </td>
              <td>
                <span class="hr-quiz-table__text"
                      th:text="${quiz.courseTitle != null ? quiz.courseTitle : '-'}">강의명</span>
              </td>
              <td>
                <span class="hr-quiz-table__text"
                      th:text="${quiz.chapterTitle != null ? quiz.chapterTitle : '-'}">챕터명</span>
              </td>
              <td>
                <span class="hr-quiz-badge" th:text="${quiz.difficultyLabel}">보통</span>
              </td>
              <td>
                <span class="hr-quiz-badge hr-quiz-badge--status" th:text="${quiz.statusLabel}">검토 대기</span>
              </td>
              <td>
                <span class="hr-quiz-table__text"
                      th:text="${quiz.sortAt != null ? #temporals.format(quiz.sortAt, 'yyyy.MM.dd HH:mm') : '-'}">
                  2026.01.01 10:00
                </span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="hr-quiz-empty" th:if="${#lists.isEmpty(quizzes)}">
        <div>
          <strong>생성된 AI 퀴즈가 없습니다.</strong>
          <p>강의 챕터의 퀴즈 생성이 완료되면 이곳에서 확인할 수 있습니다.</p>
        </div>
      </div>
    </section>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
