<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부서 비교 통계 | H-Links</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/hr-stats.css}">
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell hr-shell">
  <div class="hr-stats-shell">
    <div th:replace="~{fragments/hr-sidebar :: sidebar('stats-organization')}"></div>

    <section class="hr-stats-main" aria-labelledby="statsTitle">
      <div class="hr-stats-top">
        <div>
          <h1 class="hr-stats-title" id="statsTitle" th:text="${view.title}">부서 비교 통계</h1>
          <p class="hr-stats-description" th:text="${view.description}">부서와 직급 단위로 학습 참여도와 역량 성장 흐름을 비교합니다.</p>
        </div>
        <div th:replace="~{fragments/hr-stats :: organizationFilter}"></div>
      </div>

      <div class="hr-stats-grid" id="statsContent">
        <div class="hr-stats-block"
             th:each="block : ${view.kpis}"
             th:classappend="${block.spanClass()}"
             th:insert="~{fragments/hr-stats :: kpi}"></div>

        <th:block th:each="section : ${view.sections}">
          <h2 class="hr-stats-section-title" th:text="${section.title}">조직별 비교</h2>
          <th:block th:each="block : ${section.blocks}">
            <div class="hr-stats-block"
                 th:if="${block.kind.name() == 'CHART'}"
                 th:classappend="${block.spanClass()}"
                 th:insert="~{fragments/hr-stats :: chartCard}"></div>
            <div class="hr-stats-block"
                 th:if="${block.kind.name() == 'RANK'}"
                 th:classappend="${block.spanClass()}"
                 th:insert="~{fragments/hr-stats :: listCard}"></div>
          </th:block>
        </th:block>
      </div>
    </section>
  </div>
</main>

<div id="hrStatsAlertModal"
     class="hr-stats-alert-overlay interest-alert-overlay"
     role="alertdialog"
     aria-modal="true"
     aria-labelledby="hr-stats-alert-title">
  <section class="hr-stats-alert interest-alert">
    <p class="hr-stats-alert__eyebrow interest-alert__eyebrow">확인 필요</p>
    <h2 id="hr-stats-alert-title">통계를 확인할 수 없습니다</h2>
    <p id="hrStatsAlertMessage" class="hr-stats-alert__message interest-alert__message">통계 확인할 조직을 선택해주세요.</p>
    <button id="hrStatsAlertClose" type="button">확인</button>
  </section>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script id="statsChartData" type="application/json" th:utext="${chartDataJson}">[]</script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>
<script th:src="@{/js/hr-stats-charts.js}" defer></script>
<script th:src="@{/js/hr-stats-async.js}" defer></script>
</body>
</html>
