<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 통계 | H-Links</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/hr-stats.css}">
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell hr-shell">
  <div class="hr-layout">
    <div th:replace="~{fragments/hr-sidebar :: sidebar('stats-learning')}"></div>

    <section class="hr-stats-main" aria-labelledby="statsTitle">
      <div class="hr-stats-top">
        <div>
          <h1 class="hr-stats-title" id="statsTitle" th:text="${view.title}">학습 통계</h1>
          <p class="hr-stats-description" th:text="${view.description}">선택한 기간, 부서, 직급의 학습 현황을 종합적으로 분석합니다.</p>
        </div>
        <div th:replace="~{fragments/hr-stats :: filter}"></div>
      </div>

      <div class="hr-stats-grid" id="statsContent">
        <div class="hr-stats-block"
             th:each="block : ${view.kpis}"
             th:classappend="${block.spanClass()}"
             th:insert="~{fragments/hr-stats :: kpi}"></div>

        <section class="hr-stats-section"
                 th:each="section : ${view.sections}"
                 th:classappend="${section.blocks.size() == 3} ? 'hr-stats-section--thirds' : ''">
          <h2 class="hr-stats-section-title" th:text="${section.title}">학습 활동</h2>
          <th:block th:each="block : ${section.blocks}">
            <div class="hr-stats-block"
                 th:if="${block.kind.name() == 'CHART'}"
                 th:classappend="${block.spanClass()}"
                 th:insert="~{fragments/hr-stats :: chartCard}"></div>
            <div class="hr-stats-block"
                 th:if="${block.kind.name() == 'RANK'}"
                 th:classappend="${block.spanClass()}"
                 th:insert="~{fragments/hr-stats :: listCard}"></div>
          </th:block>
        </section>
      </div>
    </section>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script id="statsChartData" type="application/json" th:utext="${chartDataJson}">[]</script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>
<script th:src="@{/js/hr-stats-charts.js}" defer></script>
<script th:src="@{/js/hr-stats-async.js}" defer></script>
</body>
</html>
