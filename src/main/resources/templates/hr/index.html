<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Dashboard | H-Links</title>
  <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/hr-stats.css}">
  <style>
    .hr-dashboard-main {
      display: grid;
      gap: 24px;
      min-width: 0;
    }

    .hr-dashboard-main__header {
      min-height: 86px;
      padding-bottom: 4px;
    }

    .hr-dashboard-main__eyebrow {
      margin: 0 0 8px;
      color: var(--color-brand);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .hr-dashboard-main__title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: var(--text-3xl);
      font-weight: var(--font-bold);
      letter-spacing: 0;
    }

    .hr-dashboard-main__description {
      margin: 10px 0 0;
      color: var(--color-text-secondary);
      font-size: var(--text-base);
    }

    .hr-dashboard-loading {
      grid-column: 1 / -1;
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      background: var(--color-bg-surface);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
    }

  </style>
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell hr-shell">
  <div class="hr-layout">
    <div th:replace="~{fragments/hr-sidebar :: sidebar('dashboard')}"></div>

    <section class="hr-dashboard-main" aria-labelledby="hrDashboardTitle">
      <div class="hr-dashboard-main__header">
        <p class="hr-dashboard-main__eyebrow">HR Dashboard</p>
        <h1 class="hr-dashboard-main__title" id="hrDashboardTitle">관리자 대시보드</h1>
        <p class="hr-dashboard-main__description">학습 운영 현황과 관리 필요 항목을 한눈에 확인합니다.</p>
      </div>

      <div class="hr-stats-grid" id="hrDashboardContent">
        <div class="hr-dashboard-loading">통계 데이터를 불러오는 중입니다.</div>
      </div>
    </section>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>
<script th:src="@{/js/hr-stats-charts.js}" defer></script>
<script th:src="@{/js/hr-dashboard.js}" defer></script>
</body>
</html>
