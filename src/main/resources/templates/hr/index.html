<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <title>HR</title>
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <style>
    .hr-admin-panel {
      padding: 32px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      background: var(--color-bg-surface);
      box-shadow: var(--shadow-sm);
    }

    .hr-admin-panel__header {
      margin-bottom: 24px;
    }

    .hr-admin-panel__title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
    }

    .hr-admin-panel__description {
      margin: 8px 0 0;
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
    }

    .hr-course-form {
      display: grid;
      gap: 18px;
    }

    .hr-course-form__field {
      display: grid;
      gap: 8px;
    }

    .hr-course-form__label {
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .hr-course-form__input,
    .hr-course-form__select,
    .hr-course-form__textarea {
      width: 100%;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      font: inherit;
    }

    .hr-course-form__textarea {
      min-height: 132px;
      resize: vertical;
    }

    .hr-course-form__help {
      color: var(--color-text-muted);
      font-size: var(--text-xs);
    }

    .hr-course-form__actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 8px;
    }

    .hr-course-form__chapter-list {
      display: grid;
      gap: 14px;
    }

    .hr-course-form__chapter {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr) auto;
      gap: 12px;
      align-items: end;
      padding: 16px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      background: var(--color-bg-soft);
    }

    .hr-course-form__add-button,
    .hr-course-form__remove-button {
      min-height: 40px;
      border-radius: var(--radius-md);
      font-weight: var(--font-bold);
      cursor: pointer;
    }

    .hr-course-form__add-button {
      width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      justify-self: center;
      border: 1px solid var(--color-border-brand);
      background: var(--color-bg-surface);
      color: var(--color-brand);
      font-size: var(--text-2xl);
      line-height: 1;
    }

    .hr-course-form__add-button:hover {
      background: var(--color-brand);
      color: var(--color-text-inverse);
    }

    .hr-course-form__remove-button {
      padding: 0 14px;
      border: 1px solid var(--color-border-default);
      background: var(--color-bg-surface);
      color: var(--color-text-secondary);
    }

    .hr-course-form__button {
      min-height: 44px;
      padding: 0 20px;
      border: 0;
      border-radius: var(--radius-md);
      background: var(--color-brand);
      color: var(--color-text-inverse);
      font-weight: var(--font-bold);
      cursor: pointer;
    }

    .hr-course-form__button:hover {
      background: var(--color-brand-hover);
    }

    @media (max-width: 768px) {
      .hr-course-form__chapter {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell">
  <section class="home-hero">
    <p class="home-brand">THE HLINKs</p>
    <h1 class="home-title">HR</h1>
    <p class="home-description">HR 권한으로 접근 가능한 팀 현황 화면입니다.</p>
  </section>

  <section class="hr-admin-panel" aria-labelledby="courseCreateTitle">
    <div class="hr-admin-panel__header">
      <h2 class="hr-admin-panel__title" id="courseCreateTitle">강의 등록</h2>
      <p class="hr-admin-panel__description">강의 메타데이터와 mp4 영상을 함께 등록합니다.</p>
    </div>

    <form class="hr-course-form"
          th:action="@{/admin/courses}"
          method="post"
          enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <label class="hr-course-form__field">
        <span class="hr-course-form__label">강의명</span>
        <input class="hr-course-form__input" type="text" name="courseTitle" required>
      </label>

      <label class="hr-course-form__field">
        <span class="hr-course-form__label">설명</span>
        <textarea class="hr-course-form__textarea" name="description" required></textarea>
      </label>

      <label class="hr-course-form__field">
        <span class="hr-course-form__label">카테고리</span>
        <select class="hr-course-form__select" name="categoryType" required>
          <option value="">선택</option>
          <option value="CAREER_PATH">커리어패스</option>
          <option value="CAREER_HIGH">커리어하이</option>
        </select>
      </label>

      <label class="hr-course-form__field">
        <span class="hr-course-form__label">강사명</span>
        <input class="hr-course-form__input" type="text" name="instructorName" required>
      </label>

      <div class="hr-course-form__field">
        <span class="hr-course-form__label">강의 챕터</span>
        <div class="hr-course-form__chapter-list" id="chapterFields">
          <div class="hr-course-form__chapter">
            <label class="hr-course-form__field">
              <span class="hr-course-form__label">챕터명</span>
              <input class="hr-course-form__input" type="text" name="chapterTitles" required>
            </label>
            <label class="hr-course-form__field">
              <span class="hr-course-form__label">mp4 영상 파일</span>
              <input class="hr-course-form__input" type="file" name="videoFiles" accept="video/mp4,.mp4" required>
            </label>
            <button class="hr-course-form__remove-button" type="button" data-remove-chapter>삭제</button>
          </div>
        </div>
        <button class="hr-course-form__add-button" type="button" id="addChapterButton" aria-label="챕터 추가">+</button>
        <span class="hr-course-form__help">각 챕터 영상은 해당 챕터 폴더에 lecture.mp4로 저장됩니다.</span>
      </div>

      <div class="hr-course-form__actions">
        <button class="hr-course-form__button" type="submit">강의 등록</button>
      </div>
    </form>
  </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
  async function generateChapterQuizzes(chapterId, quizCount = 3, difficulty = 'MEDIUM') {
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const params = new URLSearchParams({quizCount, difficulty});

    const response = await fetch(`/api/quizzes/chapters/${chapterId}/generate?${params}`, {
      method: 'POST',
      headers: {
        [csrfHeader]: csrfToken
      }
    });

    if (!response.ok) {
      throw new Error('AI 퀴즈 생성 요청에 실패했습니다.');
    }

    return response.json();
  }

  const chapterFields = document.getElementById('chapterFields');
  const addChapterButton = document.getElementById('addChapterButton');

  function updateRemoveButtons() {
    const removeButtons = chapterFields.querySelectorAll('[data-remove-chapter]');
    removeButtons.forEach((button) => {
      button.disabled = removeButtons.length === 1;
    });
  }

  addChapterButton.addEventListener('click', () => {
    const firstChapter = chapterFields.querySelector('.hr-course-form__chapter');
    const nextChapter = firstChapter.cloneNode(true);

    nextChapter.querySelectorAll('input').forEach((input) => {
      input.value = '';
    });

    chapterFields.appendChild(nextChapter);
    updateRemoveButtons();
  });

  chapterFields.addEventListener('click', (event) => {
    const removeButton = event.target.closest('[data-remove-chapter]');

    if (!removeButton || chapterFields.children.length === 1) {
      return;
    }

    removeButton.closest('.hr-course-form__chapter').remove();
    updateRemoveButtons();
  });

  updateRemoveButtons();
</script>
</body>
</html>
