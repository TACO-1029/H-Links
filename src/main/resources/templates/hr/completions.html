<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수료 현황 | H-Links</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/tokens.css}">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/hr-stats.css}">
  <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
</head>
<body class="home-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="home-shell hr-shell">
  <div class="hr-layout">
    <div th:replace="~{fragments/hr-sidebar :: sidebar('course-completions')}"></div>

    <section class="admin-dashboard" aria-labelledby="courseCompletionStatusTitle">
      <header class="admin-dashboard__header">
        <div>
          <p class="admin-dashboard__eyebrow">
            <i class="bi bi-award" aria-hidden="true"></i>
            <span>Course Completions</span>
          </p>
          <h1 class="admin-dashboard__title" id="courseCompletionStatusTitle">수료 현황</h1>
          <p class="admin-dashboard__description">강의별 수강자의 진도율, 퀴즈 상태, 수료 상태를 확인합니다.</p>
        </div>
      </header>

      <section class="admin-dashboard__panel" aria-labelledby="completionFilterTitle">
        <div class="admin-dashboard__panel-header">
          <h2 class="admin-dashboard__panel-title" id="completionFilterTitle">
            <i class="bi bi-funnel" aria-hidden="true"></i>
            <span>필터</span>
          </h2>
        </div>
        <form class="admin-dashboard__filter" th:action="@{/hr/completions}" method="get">
          <label class="admin-filter-field">
            <span>강의 유형</span>
            <select class="form-select" name="courseType">
              <option value="all" th:selected="${filter.courseType == 'all'}">전체</option>
              <option value="ONLINE" th:selected="${filter.courseType == 'ONLINE'}">온라인</option>
              <option value="OFFLINE" th:selected="${filter.courseType == 'OFFLINE'}">오프라인</option>
            </select>
          </label>
          <label class="admin-filter-field">
            <span>수료 상태</span>
            <select class="form-select" name="completionStatus">
              <option value="all" th:selected="${filter.completionStatus == 'all'}">전체</option>
              <option value="COMPLETED" th:selected="${filter.completionStatus == 'COMPLETED'}">수료</option>
              <option value="INCOMPLETE" th:selected="${filter.completionStatus == 'INCOMPLETE'}">미수료</option>
            </select>
          </label>
          <label class="admin-filter-field">
            <span>강의명</span>
            <input class="form-control" type="search" name="keyword" placeholder="강의명 검색" th:value="${filter.keyword}">
          </label>
          <label class="admin-filter-field">
            <span>부서</span>
            <select class="form-select" name="departmentId">
              <option value="" th:selected="${filter.departmentId == null}">전체</option>
              <option th:each="department : ${departments}"
                      th:value="${department.id}"
                      th:text="${department.name}"
                      th:selected="${filter.departmentId != null and filter.departmentId == department.id}">부서</option>
            </select>
          </label>
          <label class="admin-filter-field">
            <span>시작일</span>
            <input class="form-control" type="date" name="startDate" th:value="${filter.startDate}">
          </label>
          <label class="admin-filter-field">
            <span>종료일</span>
            <input class="form-control" type="date" name="endDate" th:value="${filter.endDate}">
          </label>
          <div class="admin-dashboard__filter-actions">
            <a class="btn btn-outline-secondary" th:href="@{/hr/completions}">
              <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
              <span>초기화</span>
            </a>
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-search" aria-hidden="true"></i>
              <span>조회</span>
            </button>
          </div>
        </form>
      </section>

      <section class="admin-dashboard__panel">
        <div class="admin-dashboard__panel-header">
          <div>
            <h2 class="admin-dashboard__panel-title">
              <i class="bi bi-list-check" aria-hidden="true"></i>
              <span>수료 목록</span>
            </h2>
            <p class="admin-dashboard__panel-description">
              총 <span th:text="${totalCount}">0</span>건을 10개씩 최근 갱신순으로 표시합니다.
            </p>
          </div>
        </div>

        <div class="admin-dashboard__empty" th:if="${#lists.isEmpty(completions)}">
          <i class="bi bi-inbox" aria-hidden="true"></i>
          <strong>아직 수료 현황 데이터가 없습니다.</strong>
          <span>수강 신청 후 학습이 시작되면 이곳에 수료 현황이 표시됩니다.</span>
        </div>

        <div class="hlinks-table-card" th:unless="${#lists.isEmpty(completions)}">
          <div class="hlinks-table-wrap">
            <table class="table table-hover align-middle hlinks-table admin-dashboard-table">
              <thead>
              <tr>
                <th>강의명</th>
                <th>강의 유형</th>
                <th>수강자</th>
                <th>부서</th>
                <th>진도율</th>
                <th>퀴즈 상태</th>
                <th>수료 상태</th>
                <th>수료일</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="completion : ${completions}">
                <td class="hlinks-table__title admin-dashboard-table__title" th:text="${completion.courseTitle}">강의명</td>
                <td th:text="${completion.courseTypeLabel}">온라인</td>
                <td th:text="${completion.learnerName}">수강자</td>
                <td th:text="${completion.departmentName}">부서</td>
                <td>
                  <div class="admin-progress">
                    <div class="progress admin-progress__track" role="progressbar"
                         th:aria-valuenow="${completion.progressRate}"
                         aria-valuemin="0"
                         aria-valuemax="100">
                      <div class="progress-bar admin-progress__bar" th:style="${'width:' + completion.progressRate + '%'}"></div>
                    </div>
                    <span class="admin-progress__value" th:text="${completion.progressRate + '%'}">0%</span>
                  </div>
                </td>
                <td th:text="${completion.quizStatusLabel}">응시 완료</td>
                <td>
                  <span class="badge rounded-pill admin-status-badge"
                        th:classappend="${' admin-status-badge--' + completion.completionTone}"
                        th:text="${completion.completionStatusLabel}">수료</span>
                </td>
                <td th:text="${completion.completedAtStr}">2026.07.08</td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>

        <nav class="admin-pagination hlinks-pagination"
             th:if="${totalPages > 1}"
             aria-label="수료 현황 페이지 이동">
          <ul class="pagination justify-content-center mb-0">
            <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
              <a class="page-link"
                 th:href="@{/hr/completions(page=${currentPage - 1}, courseType=${filter.courseType}, completionStatus=${filter.completionStatus}, keyword=${filter.keyword}, departmentId=${filter.departmentId}, startDate=${filter.startDate}, endDate=${filter.endDate})}"
                 aria-label="이전 페이지">
                <i class="bi bi-chevron-left" aria-hidden="true"></i>
              </a>
            </li>
            <li class="page-item"
                th:each="pageItem : ${pageItems}"
                th:classappend="${pageItem.active} ? ' active' : (${pageItem.ellipsis} ? ' disabled' : '')">
              <span class="page-link"
                    th:if="${pageItem.ellipsis}"
                    th:text="${pageItem.label}">...</span>
              <a class="page-link"
                 th:unless="${pageItem.ellipsis}"
                 th:href="@{/hr/completions(page=${pageItem.page}, courseType=${filter.courseType}, completionStatus=${filter.completionStatus}, keyword=${filter.keyword}, departmentId=${filter.departmentId}, startDate=${filter.startDate}, endDate=${filter.endDate})}"
                 th:text="${pageItem.label}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
              <a class="page-link"
                 th:href="@{/hr/completions(page=${currentPage + 1}, courseType=${filter.courseType}, completionStatus=${filter.completionStatus}, keyword=${filter.keyword}, departmentId=${filter.departmentId}, startDate=${filter.startDate}, endDate=${filter.endDate})}"
                 aria-label="다음 페이지">
                <i class="bi bi-chevron-right" aria-hidden="true"></i>
              </a>
            </li>
          </ul>
        </nav>
      </section>
    </section>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
