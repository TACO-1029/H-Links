<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="stage-tetris">
    <!-- Stage 3: Prototype Tetris 4x4 Game -->
    <article id="stage-tetris" class="kcy-question" style="display:none;">
        <h2>프로젝트에 쓰고 싶은 기술을 원하는대로 넣어주세요.</h2>
        
        <div class="board-layout">
            <!-- 4x4 스냅 그리드 -->
            <div class="grid-container" id="grid-board">
                <div class="grid-cell" data-x="0" data-y="0"></div><div class="grid-cell" data-x="1" data-y="0"></div><div class="grid-cell" data-x="2" data-y="0"></div><div class="grid-cell" data-x="3" data-y="0"></div>
                <div class="grid-cell" data-x="0" data-y="1"></div><div class="grid-cell" data-x="1" data-y="1"></div><div class="grid-cell" data-x="2" data-y="1"></div><div class="grid-cell" data-x="3" data-y="1"></div>
                <div class="grid-cell" data-x="0" data-y="2"></div><div class="grid-cell" data-x="1" data-y="2"></div><div class="grid-cell" data-x="2" data-y="2"></div><div class="grid-cell" data-x="3" data-y="2"></div>
                <div class="grid-cell" data-x="0" data-y="3"></div><div class="grid-cell" data-x="1" data-y="3"></div><div class="grid-cell" data-x="2" data-y="3"></div><div class="grid-cell" data-x="3" data-y="3"></div>
                <div class="scanner-line" id="scanner"></div>
            </div>

            <!-- 블록 인벤토리 대기열 -->
            <div class="inventory-shelf" id="shelf"></div>
        </div>

        <div class="kcy-test-card__footer">
            <div></div>
            <button class="teams-quick-reply-btn" type="button" onclick="deploySprint()">🚀 배포 및 결과 확인</button>
        </div>
    </article>
</th:block>
</html>
