<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCY 테스트</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/kcy.css}">
</head>
<body class="kcy-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="kcy-shell">
    <section class="kcy-intro" data-kcy-intro aria-labelledby="kcy-intro-title">
        <span class="kcy-pill">DEV-STRENGTH DIAGNOSIS</span>
        <h1 id="kcy-intro-title">KCY TEST</h1>
        <p>
            나의 개발 스타일, 협업 패턴, 기술 탐구 방식을 분석해<br>
            맞춤형 커리어 패스와 성장 방향을 도출합니다.
        </p>

        <div class="kcy-card-stage" aria-hidden="true">
            <button
                    type="button"
                    class="kcy-persona-card is-far-left"
                    style="--rotate: -20deg; --z-index: 1;"
                    data-kcy-persona-card>
        <span class="kcy-persona-card__inner">
            <span class="kcy-persona-card__face kcy-persona-card__face--front">
                <span class="kcy-persona-card__image">
                    <img th:src="@{/images/kcy/awcp.webp}" alt="">
                </span>
                <span class="kcy-persona-card__badge">AWCP</span>
                <strong>AI 협업 설계자</strong>
                <span>AI를 활용해 협업 흐름과 구조를 함께 설계합니다.</span>
            </span>
            <span class="kcy-persona-card__face kcy-persona-card__face--back">
                <strong>협업형 성장</strong>
                <span>팀 맥락에 맞는 도구 활용과 실행 계획에 강한 유형</span>
            </span>
        </span>
            </button>

            <button
                    type="button"
                    class="kcy-persona-card is-left"
                    style="--rotate: -10deg; --z-index: 2;"
                    data-kcy-persona-card>
        <span class="kcy-persona-card__inner">
            <span class="kcy-persona-card__face kcy-persona-card__face--front">
                <span class="kcy-persona-card__image">
                    <img th:src="@{/images/kcy/awim.webp}" alt="">
                </span>
                <span class="kcy-persona-card__badge">AWIM</span>
                <strong>AI 자율 탐구자</strong>
                <span>AI와 함께 넓게 탐색하며 자신만의 답을 찾아갑니다.</span>
            </span>
            <span class="kcy-persona-card__face kcy-persona-card__face--back">
                <strong>자율형 학습</strong>
                <span>빠른 탐색 및 독립적인 실험에 강한 유형</span>
            </span>
        </span>
            </button>

            <button
                    type="button"
                    class="kcy-persona-card is-center"
                    style="--rotate: 0deg; --z-index: 5;"
                    data-kcy-persona-card>
        <span class="kcy-persona-card__inner">
            <span class="kcy-persona-card__face kcy-persona-card__face--front">
                <span class="kcy-persona-card__image">
                    <img th:src="@{/images/kcy/odcp.webp}" alt="">
                </span>
                <span class="kcy-persona-card__badge">ODCP</span>
                <strong>정밀 협업 설계자</strong>
                <span>깊은 분석을 바탕으로 팀의 실행 방향을 정렬합니다.</span>
            </span>
            <span class="kcy-persona-card__face kcy-persona-card__face--back">
                <strong>설계 중심</strong>
                <span>복잡한 문제를 구조화하고 협업 기준을 세우는 유형</span>
            </span>
        </span>
            </button>

            <button
                    type="button"
                    class="kcy-persona-card is-right"
                    style="--rotate: 10deg; --z-index: 3;"
                    data-kcy-persona-card>
        <span class="kcy-persona-card__inner">
            <span class="kcy-persona-card__face kcy-persona-card__face--front">
                <span class="kcy-persona-card__image">
                    <img th:src="@{/images/kcy/owcp.webp}" alt="">
                </span>
                <span class="kcy-persona-card__badge">OWCP</span>
                <strong>확장형 조율가</strong>
                <span>넓은 시야로 팀의 선택지를 비교하고 연결합니다.</span>
            </span>
            <span class="kcy-persona-card__face kcy-persona-card__face--back">
                <strong>조율 중심</strong>
                <span>다양한 관점을 모아 실행 가능한 방향으로 묶는 유형</span>
            </span>
        </span>
            </button>

            <button
                    type="button"
                    class="kcy-persona-card is-far-right"
                    style="--rotate: 20deg; --z-index: 1;"
                    data-kcy-persona-card>
        <span class="kcy-persona-card__inner">
            <span class="kcy-persona-card__face kcy-persona-card__face--front">
                <span class="kcy-persona-card__image">
                    <img th:src="@{/images/kcy/owim.webp}" alt="">
                </span>
                <span class="kcy-persona-card__badge">OWIM</span>
                <strong>확장형 탐험가</strong>
                <span>넓게 시도하며 자신만의 성장 경로를 만들어갑니다.</span>
            </span>
            <span class="kcy-persona-card__face kcy-persona-card__face--back">
                <strong>탐색 중심</strong>
                <span>새로운 기술과 방식에 빠르게 적응하는 유형</span>
            </span>
        </span>
            </button>
        </div>

        <div class="kcy-intro__features" aria-label="KCY 테스트 구성">
            <article class="kcy-feature">
                <span>1</span>
                <div>
                    <strong>핵심 성향 분석</strong>
                    <p>실행형, 설계 방식, 협업 성향, 도구 활용 방식을 종합적으로 확인합니다.</p>
                </div>
            </article>
            <article class="kcy-feature">
                <span>2</span>
                <div>
                    <strong>맞춤형 결과 카드</strong>
                    <p>진단 결과를 바탕으로 개인의 강점과 보완 방향을 카드 형태로 제공합니다.</p>
                </div>
            </article>
        </div>

        <div class="kcy-intro__actions">
            <button class="kcy-button kcy-button--primary" type="button" data-kcy-start>
                성향 테스트 시작하기
            </button>
        </div>
    </section>

    <!-- SPA MS Teams Layout Section -->
    <section class="kcy-test" data-kcy-test hidden>
        <form th:action="@{/kcy}"
              th:object="${kcySubmitRequest}"
              method="post"
              id="kcyAdaptiveForm"
              style="width: 100%; max-width: 2560px; margin: 0 auto; display: block;">
            <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- MS Teams Workspace Web Shell -->
            <div class="teams-layout">
                <!-- 1. MS Teams Vertical App Bar -->
                <div class="teams-app-bar" style="display: flex; flex-direction: column; justify-content: space-between; padding-bottom: 12px; height: 100%;">
                    <div class="teams-app-bar-top" style="display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                        <div class="teams-app-item" title="활동">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M12 2a4.95 4.95 0 014.9 4.36L17 7v4.67l1.7 1.7a1 1 0 01.3.7v1.43a1 1 0 01-1 1H6a1 1 0 01-1-1v-1.43a1 1 0 01.3-.7L7 11.67V7a4.95 4.95 0 015-5zm0 17a2.5 2.5 0 01-2.42-1.92l-.08-.08h5a2.5 2.5 0 01-2.5 2.5z" fill="currentColor"/></svg>
                            </div>
                            <span>활동</span>
                        </div>
                        <div class="teams-app-item active" title="채팅">
                            <div class="teams-app-icon" style="position: relative;">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M12 3c5.52 0 10 3.58 10 8a6.93 6.93 0 01-1.8 4.6l1.75 3.32a.75.75 0 01-1.07 1l-3.8-2A11 11 0 0112 19c-5.52 0-10-3.58-10-8s4.48-8 10-8zm0 1.5c-4.69 0-8.5 2.91-8.5 6.5s3.81 6.5 8.5 6.5c1.47 0 2.87-.29 4.1-.8a.75.75 0 01.76.08l2.67 1.41-1.22-2.31a.75.75 0 01.07-.84A5.43 5.43 0 0020.5 11c0-3.59-3.81-6.5-8.5-6.5z" fill="currentColor"/></svg>
                                <span class="teams-badge" style="position: absolute; top: -2px; right: -2px; background: #e81123; color: #fff; border-radius: 50%; width: 14px; height: 14px; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold;">2</span>
                            </div>
                            <span>채팅</span>
                        </div>
                        <div class="teams-app-item" title="팀">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M12.25 15.5H19a2.25 2.25 0 002.25-2.25V9A2.25 2.25 0 0019 6.75h-6.75A2.25 2.25 0 0010 9v4.25a2.25 2.25 0 002.25 2.25zm.25-7.25h6a.75.75 0 01.75.75v3.5a.75.75 0 01-.75.75h-6a.75.75 0 01-.75-.75V9a.75.75 0 01.75-.75zm-6.25 9.5c-1.38 0-2.5-1.12-2.5-2.5V9.5a.75.75 0 00-1.5 0V15.25a4 4 0 004 4h7a.75.75 0 000-1.5H6.25z" fill="currentColor"/></svg>
                            </div>
                            <span>팀</span>
                        </div>
                        <div class="teams-app-item" title="일정">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M19 4h-1V2.75a.75.75 0 00-1.5 0V4H8.5V2.75a.75.75 0 00-1.5 0V4H6a3 3 0 00-3 3v12a3 3 0 003 3h13a3 3 0 003-3V7a3 3 0 00-3-3zm1.5 15a1.5 1.5 0 01-1.5 1.5H6A1.5 1.5 0 014.5 19V9.5h15V19zm0-11h-15V7A1.5 1.5 0 016 5.5h1v.75a.75.75 0 001.5 0V5.5h7v.75a.75.75 0 001.5 0V5.5h1A1.5 1.5 0 0120.5 7v1z" fill="currentColor"/></svg>
                            </div>
                            <span>일정</span>
                        </div>
                        <div class="teams-app-item" title="통화">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M2.5 5.5A3 3 0 015.5 2.5h2.56a1 1 0 01.96.72l1.07 4.29a1 1 0 01-.58 1.15L8.14 9.38a13 13 0 006.48 6.48l.72-1.37a1 1 0 011.15-.58l4.29 1.07a1 1 0 01.72.96v2.56a3 3 0 01-3 3h-.5C10.16 21.5 2.5 13.84 2.5 6.5v-.5zM5.5 4a1.5 1.5 0 00-1.5 1.5c0 6.07 6.43 12.5 12.5 12.5a1.5 1.5 0 001.5-1.5v-1.84l-3.32-.83-.8 1.51a.75.75 0 01-.89.37 14.5 14.5 0 01-8.2-8.2.75.75 0 01.37-.89l1.51-.8-.83-3.32H5.5z" fill="currentColor"/></svg>
                            </div>
                            <span>통화</span>
                        </div>
                        <div class="teams-app-item" title="파일">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M19.5 21a1.5 1.5 0 001.5-1.5v-12A1.5 1.5 0 0019.5 6h-6.2l-2-2H4.5A1.5 1.5 0 003 5.5v14A1.5 1.5 0 004.5 21h15zM4.5 7.5h15v12h-15v-12zM12.5 5l1.5 1.5h5.5V6H14L12.5 4.5H4.5V6h6.8l1.2-1z" fill="currentColor"/></svg>
                            </div>
                            <span>파일</span>
                        </div>
                        <div class="teams-app-item" title="더보기">
                            <div class="teams-app-icon" style="font-size: 14px; font-weight: bold; line-height: 12px; height: 20px; display: flex; align-items: center;">...</div>
                        </div>
                    </div>
                    <div class="teams-app-bar-bottom" style="display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                        <div class="teams-app-item" title="앱">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z" fill="currentColor"/></svg>
                            </div>
                            <span>앱</span>
                        </div>
                        <div class="teams-app-item" title="도움말">
                            <div class="teams-app-icon">
                                <svg class="teams-app-svg" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18.5a8.5 8.5 0 110-17 8.5 8.5 0 010 17zm0-13a2.5 2.5 0 00-2.5 2.5.75.75 0 01-1.5 0A4 4 0 1112 12a1 1 0 00-1 1 .75.75 0 01-1.5 0 2.5 2.5 0 012.5-2.5 2.5 2.5 0 002.5-2.5c0-1.38-1.12-2.5-2.5-2.5zm0 10.5a1 1 0 110-2 1 1 0 010 2z" fill="currentColor"/></svg>
                            </div>
                            <span>도움말</span>
                        </div>
                    </div>
                </div>

                <!-- 2. Left Sidebar -->
                <div class="teams-sidebar">
                    <div class="teams-sidebar-header">
                        <span class="teams-sidebar-title">H-Links Workspace</span>
                    </div>
                    <div class="teams-sidebar-sections">
                        <div class="teams-sidebar-section">
                            <div class="teams-section-title">채널</div>
                            <div class="teams-item active">
                                <span style="font-weight: bold;">#</span>
                                <span>kcy-성향-진단</span>
                            </div>
                        </div>
                        <div class="teams-sidebar-section">
                            <div class="teams-section-title font-bold">다이렉트 메시지</div>
                            <div class="teams-item">
                                <div class="teams-status-dot"></div>
                                <span style="margin-left: 4px;">흰디 매니저</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. Main Chat Area -->
                <div class="teams-main">
                    <div class="teams-chat-header-wrap">
                        <div class="teams-chat-header">
                            <span class="teams-chat-title">#kcy-성향-진단</span>
                        </div>
                        <!-- MS Teams style Header Progress Bar -->
                        <div class="teams-header-progress-bar-container" style="width: 100%; height: 3px; background: #e0e0e0; position: relative;">
                            <div id="teams-header-progress-bar" style="width: 0%; height: 100%; background: #009E7A; transition: width 0.3s ease;"></div>
                        </div>
                    </div>
                    <div class="teams-chat-area">
                        <!-- Scrollable Message Stream -->
                        <div class="teams-messages" id="chat-messages">
                            <!-- Messages appended here dynamically -->
                        </div>

                        <!-- Chat Bottom Controls -->
                        <div class="teams-input-area" style="padding: 0; border: none; background: transparent;">
                            <div class="teams-options-container" id="chat-options-container">
                                <!-- MCQ option buttons & Undo buttons injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Templates for Inline Attachment Blocks -->
<template id="template-stage-attachment">
    <th:block th:replace="recommend/kcy/fragments/template-stage-attachment :: stage-attachment"></th:block>
</template>

<template id="template-stage-hook">
    <th:block th:replace="recommend/kcy/fragments/stage-hook :: stage-hook"></th:block>
</template>

<template id="template-stage-mcq">
    <th:block th:replace="recommend/kcy/fragments/stage-mcq :: stage-mcq"></th:block>
</template>

<template id="template-stage-tetris">
    <th:block th:replace="recommend/kcy/fragments/stage-tetris :: stage-tetris"></th:block>
</template>

<script>
    let state = {
        selectedOptionIds: [],
        angerScoreTypes: [],
        tiebreakerBlocks: [],
        timeTaken: 0,
        fillRate: 0,
        bypassEarlyStop: false,
        tetrisFinished: false,
        history: [],        // State history snapshots for Undo
        questionHistory: [] // MCQ question DTO history snapshots for Undo
    };
    let tetrisStartTime = 0;
    let isDelayEnabled = true;
    let allBlocks = [];

    const intro = document.querySelector("[data-kcy-intro]");
    const test = document.querySelector("[data-kcy-test]");
    const startButton = document.querySelector("[data-kcy-start]");
    
    startButton.addEventListener("click", () => {
        intro.hidden = true;
        test.hidden = false;
        initChatFlow();
    });

    // 개발자 편의용: 왼쪽 앱바 '활동' 버튼 클릭 시 딜레이 모드 토글
    document.addEventListener("DOMContentLoaded", () => {
        const activityBtn = document.querySelector('.teams-app-item[title="활동"]');
        if (activityBtn) {
            activityBtn.style.cursor = 'pointer';
            activityBtn.addEventListener('click', (e) => {
                e.preventDefault();
                isDelayEnabled = !isDelayEnabled;
                if (isDelayEnabled) {
                    activityBtn.style.color = '';
                    activityBtn.style.background = '';
                    alert("개발자 딜레이 모드: ON (일반 딜레이 작동)");
                } else {
                    activityBtn.style.color = '#e81123';
                    activityBtn.style.background = 'rgba(232, 17, 35, 0.1)';
                    alert("개발자 딜레이 모드: OFF (딜레이 없이 즉시 로드)");
                }
            });
        }
    });

    /* ============================================================= */
    /* MS Teams Conversation Message Utilities                       */
    /* ============================================================= */
    const userName = "[[${#authentication.principal.name}]]" || '개발자';
    const botAvatar = '/images/kcy/awcp.webp';
    const userAvatar = '/images/kcy/odcp.webp';

    function appendBotMessage(text, stepIndex, immediateAnimate) {
        const chatMessages = document.getElementById('chat-messages');
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const animClass = immediateAnimate ? 'fade-in-init' : '';
        const html = `
            <div class="teams-message incoming step-${stepIndex} ${animClass}">
                <div class="teams-avatar">
                    <img src="${botAvatar}" alt="흰디 매니저">
                </div>
                <div class="teams-msg-content">
                    <div class="teams-msg-header">
                        <span class="teams-sender">흰디 매니저</span>
                        <span class="teams-time">${timeStr}</span>
                    </div>
                    <div class="teams-msg-bubble">${text}</div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        
        if (immediateAnimate) {
            const lastMsg = chatMessages.lastElementChild;
            // Force reflow
            lastMsg.getBoundingClientRect();
            lastMsg.classList.add('fade-in-active');
        }
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function appendUserMessage(text, stepIndex) {
        const chatMessages = document.getElementById('chat-messages');
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const html = `
            <div class="teams-message outgoing step-${stepIndex}">
                <div class="teams-avatar">
                    <img src="${userAvatar}" alt="나">
                </div>
                <div class="teams-msg-content">
                    <div class="teams-msg-header">
                        <span class="teams-sender">나</span>
                        <span class="teams-time">${timeStr}</span>
                    </div>
                    <div class="teams-msg-bubble">${text}</div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator(stepIndex) {
        const chatMessages = document.getElementById('chat-messages');
        const html = `
            <div class="teams-message incoming teams-typing-indicator step-${stepIndex}">
                <div class="teams-avatar">
                    <img src="${botAvatar}" alt="흰디 매니저">
                </div>
                <div class="teams-msg-content">
                    <div class="teams-msg-bubble">
                        <div class="teams-typing">
                            <span class="teams-typing-dot"></span>
                            <span class="teams-typing-dot"></span>
                            <span class="teams-typing-dot"></span>
                        </div>
                    </div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.querySelector('.teams-typing-indicator');
        if (indicator) indicator.remove();
    }

    /* ============================================================= */
    /* Sequential Message Flow Engine with Text-Length Based Delay   */
    /* ============================================================= */
    function enqueueMessages(messagesList, onComplete) {
        let chain = Promise.resolve();
        messagesList.forEach(m => {
            chain = chain.then(() => {
                return new Promise((resolve) => {
                    const text = m.text || '';
                    
                    // 개발자 딜레이 꺼짐 모드
                    if (!isDelayEnabled) {
                        if (text) {
                            appendBotMessage(text, m.stepIndex, true);
                        }
                        if (m.isHookCard) {
                            appendAttachment('hook', m.stepIndex);
                        } else if (m.isTetrisCard) {
                            appendAttachment('tetris', m.stepIndex, m.blocks);
                        } else if (m.isMcqCard) {
                            appendAttachment('mcq', m.stepIndex, m.question);
                        }
                        resolve();
                        return;
                    }

                    // 10자 이하 단문은 타이핑 인디케이터 없이 600ms 대기 후 즉시 노출
                    const isShort = text.length <= 10;
                    const delay = isShort ? 600 : Math.max(1800, Math.min(6000, text.length * 36));

                    if (isShort) {
                        setTimeout(() => {
                            if (text) {
                                appendBotMessage(text, m.stepIndex, true);
                            }
                            if (m.isHookCard) {
                                appendAttachment('hook', m.stepIndex);
                            } else if (m.isTetrisCard) {
                                appendAttachment('tetris', m.stepIndex, m.blocks);
                            } else if (m.isMcqCard) {
                                appendAttachment('mcq', m.stepIndex, m.question);
                            }
                            resolve();
                        }, delay);
                    } else {
                        showTypingIndicator(m.stepIndex);
                        setTimeout(() => {
                            removeTypingIndicator();
                            if (text) {
                                appendBotMessage(text, m.stepIndex, false);
                            }
                            if (m.isHookCard) {
                                appendAttachment('hook', m.stepIndex);
                            } else if (m.isTetrisCard) {
                                appendAttachment('tetris', m.stepIndex, m.blocks);
                            } else if (m.isMcqCard) {
                                appendAttachment('mcq', m.stepIndex, m.question);
                            }
                            resolve();
                        }, delay);
                    }
                });
            });
        });

        if (onComplete) {
            chain.then(onComplete);
        }
    }

    /* ============================================================= */
    /* Step 1: Initial Hook Setup                                    */
    /* ============================================================= */
    function initChatFlow() {
        updateHeaderProgress();
        // Enqueue welcome dialogue sequences with dynamic delays
        enqueueMessages([
            { text: "안녕하세요! H-Links 커리어 진단 워크스페이스에 오신 것을 환영합니다. 👋", stepIndex: 0 },
            { text: "OOO님! 방금 신입 직원분께서 코드리뷰를 요청하셨어요. 어떤 부분들을 중점적으로 피드백주시겠나요?", stepIndex: 0 },
            { isHookCard: true, stepIndex: 0 }
        ]);
    }

    function appendAttachment(type, stepIndex, extraData) {
        const chatMessages = document.getElementById('chat-messages');
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // 봇 메시지 껍데기 마크업 생성
        const wrapperId = `msg-wrap-${type}-${stepIndex}`;
        const msgWrapperHtml = `
            <div class="teams-message incoming step-${stepIndex}" id="${wrapperId}" style="margin-bottom: 12px; width: 100%;">
                <div class="teams-avatar">
                    <img src="${botAvatar}" alt="흰디 매니저">
                </div>
                <div class="teams-msg-content" style="width: 100%;">
                    <div class="teams-msg-header">
                        <span class="teams-sender">흰디 매니저</span>
                        <span class="teams-time">${timeStr}</span>
                    </div>
                    <div class="teams-attachment-area"></div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', msgWrapperHtml);
        const lastMsg = document.getElementById(wrapperId);
        const attachmentArea = lastMsg.querySelector('.teams-attachment-area');

        const template = document.getElementById('template-stage-attachment');
        if (!template) return;
        const clone = document.importNode(template.content, true);
        const wrapper = clone.querySelector('.teams-msg-attachment');
        wrapper.classList.add('attachment-' + type);
        wrapper.className += ` step-${stepIndex}`;
        
        // 타입별 콘텐츠 주입
        const innerTemplate = document.getElementById('template-stage-' + type);
        if (innerTemplate) {
            const innerClone = document.importNode(innerTemplate.content, true);
            const innerContainer = wrapper.querySelector('.attachment-inner');
            if (innerContainer) {
                innerContainer.appendChild(innerClone);
            }
        }
        
        attachmentArea.appendChild(wrapper);
        
        if (type === 'hook') {
            bindHookListeners();
        } else if (type === 'mcq') {
            renderMcqCardContent(wrapper, extraData);
        } else if (type === 'tetris') {
            wrapper.classList.add('tetris-full-overlay');
            const tetrisArticle = wrapper.querySelector('#stage-tetris');
            if (tetrisArticle) {
                tetrisArticle.style.display = 'block';
            }
            
            // 전역 테트리스 변수 리셋
            occupied = Array(4).fill(null).map(() => Array(4).fill(false));
            blockStates = {};
            tetrisStartTime = Date.now();
            
            renderTetrisBlocks(extraData);
        }
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function renderMcqCardContent(cardWrapper, question) {
        const text = cardWrapper.querySelector('#mcq-question-text');
        const optionsContainer = cardWrapper.querySelector('#mcq-options-container');
        
        text.textContent = question.questionText;
        
        optionsContainer.innerHTML = '';
        question.options.forEach(opt => {
            optionsContainer.innerHTML += `
                <label class="teams-mcq-option" style="padding: 10px 16px; border-radius: 6px; border: 1px solid #e0e0e0; display: block; cursor: pointer; transition: background 0.15s, border-color 0.15s; margin-bottom: 2px;">
                    <input type="radio" name="mcq-question-${question.kcyQuestionId}" value="${opt.kcyOptionId}" data-text="${opt.optionText}" onclick="handleMcqSelect(this)" style="display: none;">
                    <span class="teams-mcq-option-text" style="font-size: 13.5px; color: #242424; font-weight: 500;">${opt.optionText}</span>
                </label>
            `;
        });
        
        // 이전으로 버튼 활성화 상태 처리 (Q1에서는 비활성화, Q2부터 활성화)
        const undoBtn = cardWrapper.querySelector('.teams-undo-btn');
        if (undoBtn) {
            undoBtn.disabled = (state.selectedOptionIds.length === 0);
        }

        // 전역 프로그레스 바 동시 갱신
        updateHeaderProgress();
    }

    function handleMcqSelect(radioInput) {
        const optionId = parseInt(radioInput.value);
        const optionText = radioInput.getAttribute('data-text');
        
        // 즉시 비활성화 (더블 탭 방지)
        const container = radioInput.closest('#mcq-options-container');
        if (container) {
            container.querySelectorAll('input').forEach(i => i.disabled = true);
        }
        
        // 푸터(이전으로 버튼 영역) 숨기기
        const card = radioInput.closest('.teams-mcq-card');
        if (card) {
            const footer = card.querySelector('.kcy-test-card__footer');
            if (footer) footer.style.display = 'none';
        }
        
        // 즉시 제출
        submitQuickReply(optionId, optionText);
    }

    function updateHeaderProgress() {
        const progressBar = document.getElementById('teams-header-progress-bar');
        if (!progressBar) return;
        
        // 총 10단계(코드리뷰 1단계 + 9개 문항 = 10단계) 기준으로 진행도 계산
        const totalSteps = 10;
        const currentStep = state.selectedOptionIds.length + (state.angerScoreTypes.length > 0 ? 1 : 0);
        const progressPercentage = Math.min(100, Math.round((currentStep / totalSteps) * 100));
        
        progressBar.style.width = `${progressPercentage}%`;
    }

    /* Paintbrush Highlighter Logic */
    let isMouseDown = false;
    document.addEventListener('mousedown', () => { isMouseDown = true; });
    document.addEventListener('mouseup', () => { isMouseDown = false; });

    function bindHookListeners() {
        const tokens = document.querySelectorAll('.token');
        tokens.forEach(tok => {
            tok.style.cursor = 'pointer';
            tok.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                tok.classList.toggle('is-highlighted');
            });
            tok.addEventListener('mouseenter', () => {
                if (isMouseDown) {
                    tok.classList.add('is-highlighted');
                }
            });
        });
    }

    function submitHook() {
        // Push initial state snapshot for Undo support at Q1
        state.history.push({
            selectedOptionIds: [...state.selectedOptionIds],
            angerScoreTypes: [...state.angerScoreTypes],
            tetrisFinished: state.tetrisFinished
        });

        const lines = document.querySelectorAll('.token.is-highlighted');
        state.angerScoreTypes = []; // reset to avoid duplicate score accumulation on re-submit
        lines.forEach(l => state.angerScoreTypes.push(l.getAttribute('data-type')));
        
        // Hide review button area entirely to lock selection (consistent with MCQ cards)
        const footer = document.querySelector('#stage-hook .kcy-test-card__footer');
        if (footer) footer.style.display = 'none';

        appendUserMessage(`[코드 리뷰 완료] ${lines.length}개의 불편한 코드 라인을 식별하여 피드백을 전달했습니다.`, 1);
        updateHeaderProgress();
        requestNextAdaptive();
    }

    /* ============================================================= */
    /* Step 2: Adaptive MCQ and Undo Handling                       */
    /* ============================================================= */
    function submitQuickReply(optionId, optionText) {
        const nextStep = state.selectedOptionIds.length + 2;

        // Push current states to history snapshots for Undo
        state.history.push({
            selectedOptionIds: [...state.selectedOptionIds],
            angerScoreTypes: [...state.angerScoreTypes],
            tetrisFinished: state.tetrisFinished
        });

        // Add user response to flow
        state.selectedOptionIds.push(optionId);
        appendUserMessage(optionText, nextStep);

        requestNextAdaptive();
    }

    function undoPreviousStep() {
        if (state.history.length === 0) return;

        const undoneStep = state.selectedOptionIds.length + 1;

        // Remove DOM nodes added during the undone step
        document.querySelectorAll(`.step-${undoneStep}`).forEach(el => el.remove());

        // Restore state values
        const lastState = state.history.pop();
        state.selectedOptionIds = lastState.selectedOptionIds;
        state.angerScoreTypes = lastState.angerScoreTypes;
        state.tetrisFinished = lastState.tetrisFinished || false;

        // Pop last question from question history
        state.questionHistory.pop();

        // 이전 카드(step-(undoneStep - 1)) 복구 및 활성화
        const prevStepIndex = undoneStep - 1;
        const prevCard = document.querySelector(`.teams-msg-attachment.step-${prevStepIndex}`);
        if (prevCard) {
            const footer = prevCard.querySelector('.kcy-test-card__footer');
            if (footer) footer.style.display = 'flex';
            
            // 라디오 버튼 및 체크 활성화 복구
            prevCard.querySelectorAll('input').forEach(i => {
                i.disabled = false;
                i.checked = false; // 라디오 선택 상태를 풀어서 사용자가 다시 선택하게 유도
            });

            // "이전으로" 버튼의 활성화 여부 재평가
            const undoBtn = prevCard.querySelector('.teams-undo-btn');
            if (undoBtn) {
                undoBtn.disabled = (state.selectedOptionIds.length === 0);
            }
        }

        // 전역 진행도 동시 갱신
        updateHeaderProgress();
    }

    function requestNextAdaptive() {
        const nextStep = state.selectedOptionIds.length + 1;
        
        // Clear previous buttons
        document.getElementById('chat-options-container').innerHTML = '';

        fetch('/kcy/adaptive-flow', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': document.getElementById('csrfToken').value
            },
            body: JSON.stringify({
                selectedOptionIds: state.selectedOptionIds,
                angerScoreTypes: state.angerScoreTypes,
                tiebreakerBlocks: state.tiebreakerBlocks,
                timeTaken: state.timeTaken,
                fillRate: state.fillRate,
                bypassEarlyStop: state.bypassEarlyStop || false,
                tetrisFinished: state.tetrisFinished || false
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'FINAL_SUBMIT_PHASE') {
                finalizeSubmission();
            } else if (data.status === 'EARLY_STOP_PROMPT') {
                state.questionHistory.push(null); // Align index
                
                // 1. 봇 멘트 말풍선 추가
                enqueueMessages([
                    { text: "충분히 데이터가 누적되어 테스트 결과를 볼 수 있어요. 어떻게 하시겠어요? 📊", stepIndex: nextStep }
                ]);
                
                // 2. 결과 보기 / 끝까지 할래요 선택지 주입
                setTimeout(() => {
                    const optContainer = document.getElementById('chat-options-container');
                    if (optContainer) {
                        optContainer.innerHTML = `
                            <div style="display: flex; gap: 8px; justify-content: center; width: 100%; padding: 8px 16px; box-sizing: border-box;">
                                <button class="teams-quick-reply-btn" type="button" onclick="handleEarlyStopChoice(true)" style="background: #009E7A; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1;">결과 보기 📊</button>
                                <button class="teams-quick-reply-btn" type="button" onclick="handleEarlyStopChoice(false)" style="background: #f3f2f1; color: #242424; border: 1px solid #d2d0ce; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1;">끝까지 할래요 📝</button>
                            </div>
                        `;
                    }
                }, 300);

            } else if (data.status === 'TETRIS_PHASE') {
                state.questionHistory.push(null); // Align index
                
                enqueueMessages([
                    { text: `${userName}님! 지금 막 ${userName}님을 위한 맞춤형 프로젝트 제안서가 도착했어요. 📋`, stepIndex: nextStep },
                    { isTetrisCard: true, blocks: data.blocks, stepIndex: nextStep }
                ]);

            } else if (data.status === 'IN_PROGRESS_MCQ') {
                state.questionHistory.push(data.nextQuestion);
                
                enqueueMessages([
                    { isMcqCard: true, question: data.nextQuestion, stepIndex: nextStep }
                ]);
            } else {
                finalizeSubmission();
            }
        });
    }

    function handleEarlyStopChoice(isStop) {
        document.getElementById('chat-options-container').innerHTML = '';
        const nextStep = state.selectedOptionIds.length + 1;
        
        if (isStop) {
            appendUserMessage("결과 보기 📊", nextStep);
            finalizeSubmission();
        } else {
            appendUserMessage("끝까지 할래요 📝", nextStep);
            state.bypassEarlyStop = true;
            requestNextAdaptive();
        }
    }



    /* ============================================================= */
    /* Step 3: Tetris Simulation and Snapping Logic                  */
    /* ============================================================= */
    function renderTetrisBlocks(blocks) {
        allBlocks = blocks;
        shuffleInventory();
    }

    const cellSize = 56;
    let occupied = Array(4).fill(null).map(() => Array(4).fill(false));
    let blockStates = {};
    let activeDrag = null;
    let dragOffset = { x: 0, y: 0 };

    function shuffleInventory() {
        // 1. 현재 보드판에 이미 드롭(배치) 완료된 블록의 아이디를 수집
        const placedIds = Object.keys(blockStates).filter(id => blockStates[id].isPlaced);
        
        // 2. 배치되지 않은 블록 후보들 필터링
        const candidates = allBlocks.filter(b => !placedIds.includes(b.id));
        
        // 3. 랜덤으로 6개 무작위 선택
        const shuffled = [...candidates].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 6);
        
        // 4. 인벤토리 쉘프에 HTML 주입
        let shelfHtml = '';
        selected.forEach(b => {
            let cellsHtml = '';
            for(let y=0; y<b.height; y++){
                for(let x=0; x<b.width; x++){
                    if(b.layout[y][x] === 1) {
                        cellsHtml += `<div class="shape-cell" style="left: ${x*56}px; top: ${y*56}px;"></div>`;
                    }
                }
            }
            shelfHtml += `
                <div class="draggable-block block-${b.theme.toLowerCase()}" id="${b.id}" data-w="${b.width}" data-h="${b.height}" data-type="${b.theme.toLowerCase()}" data-block="${b.theme.toUpperCase()}" data-layout='${JSON.stringify(b.layout)}' style="width: ${b.width * 56}px; height: ${b.height * 56}px; position: relative;">
                    ${cellsHtml}
                    <div class="block-label" style="line-height: 1.2;">${b.name.replace(' ', '<br>')}</div>
                </div>
            `;
        });
        document.getElementById('shelf').innerHTML = shelfHtml;
        
        // 5. 쉘프 안의 새로운 드래그 대상에만 리스너 바인딩
        const draggables = document.getElementById('shelf').querySelectorAll('.draggable-block');
        draggables.forEach(block => {
            if (!blockStates[block.id]) {
                blockStates[block.id] = { x: -1, y: -1, isPlaced: false };
            }
            block.addEventListener('mousedown', startDrag);
            block.addEventListener('touchstart', startDrag, { passive: false });
        });
    }

    function resetSprintBoard() {
        if (!confirm("배치된 모든 기술 블록을 초기화하시겠습니까?")) return;
        
        const gridBoard = document.getElementById('grid-board');
        const placedBlocks = gridBoard.querySelectorAll('.draggable-block');
        placedBlocks.forEach(b => b.remove());
        
        occupied = Array(4).fill(null).map(() => Array(4).fill(false));
        blockStates = {};
        
        shuffleInventory();
    }

    function startDrag(e) {
        e.preventDefault();
        activeDrag = e.currentTarget;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = activeDrag.getBoundingClientRect();
        dragOffset.x = clientX - rect.left;
        dragOffset.y = clientY - rect.top;

        // 드래그 중인 블록의 description 툴팁 표시
        const blockId = activeDrag.id;
        const blockData = allBlocks.find(b => b.id === blockId);
        if (blockData && blockData.description && blockData.description.trim() !== '') {
            const toast = document.getElementById('tetris-tooltip-toast');
            if (toast) {
                toast.innerHTML = `<strong>💡 ${blockData.name}</strong>: ${blockData.description}`;
                toast.style.display = 'block';
                toast.style.opacity = '1';
            }
        }

        const stateVal = blockStates[activeDrag.id];
        if (stateVal.isPlaced) {
            const w = parseInt(activeDrag.getAttribute('data-w'));
            const h = parseInt(activeDrag.getAttribute('data-h'));
            const layout = JSON.parse(activeDrag.getAttribute('data-layout'));
            setOccupied(stateVal.x, stateVal.y, w, h, layout, false);
            stateVal.isPlaced = false;
        }

        activeDrag.style.position = 'fixed';
        activeDrag.style.left = `${clientX - dragOffset.x}px`;
        activeDrag.style.top = `${clientY - dragOffset.y}px`;
        activeDrag.style.zIndex = '1000';
        activeDrag.style.transform = 'scale(1.05) rotate(2deg)';
        activeDrag.style.opacity = '0.85';

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function dragMove(e) {
        if (!activeDrag) return;
        e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        activeDrag.style.left = `${clientX - dragOffset.x}px`;
        activeDrag.style.top = `${clientY - dragOffset.y}px`;
    }

    function endDrag(e) {
        if (!activeDrag) return;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);

        const toast = document.getElementById('tetris-tooltip-toast');
        if (toast) {
            toast.style.opacity = '0';
            setTimeout(() => {
                if (toast.style.opacity === '0') toast.style.display = 'none';
            }, 150);
        }

        const block = activeDrag;
        activeDrag = null;
        block.style.transform = '';
        block.style.opacity = '';
        block.style.zIndex = '15';

        const gridBoard = document.getElementById('grid-board');
        const shelf = document.getElementById('shelf');

        const boardRect = gridBoard.getBoundingClientRect();
        const blockRect = block.getBoundingClientRect();
        const leftDiff = blockRect.left - boardRect.left - 2;
        const topDiff = blockRect.top - boardRect.top - 2;

        const x = Math.round(leftDiff / cellSize);
        const y = Math.round(topDiff / cellSize);
        const w = parseInt(block.getAttribute('data-w'));
        const h = parseInt(block.getAttribute('data-h'));
        const layout = JSON.parse(block.getAttribute('data-layout'));

        if (canPlace(x, y, w, h, layout)) {
            setOccupied(x, y, w, h, layout, true);
            blockStates[block.id] = { x, y, isPlaced: true };
            gridBoard.appendChild(block);
            block.style.position = 'absolute';
            block.style.left = `${x * cellSize + 2}px`;
            block.style.top = `${y * cellSize + 2}px`;
        } else {
            shelf.appendChild(block);
            block.style.position = 'relative';
            block.style.left = '';
            block.style.top = '';
            blockStates[block.id] = { x: -1, y: -1, isPlaced: false };
        }
    }

    function canPlace(x, y, w, h, layout) {
        for (let i = 0; i < w; i++) {
            for (let j = 0; j < h; j++) {
                if (layout[j][i] === 1) { // y, x
                    let targetX = x + i;
                    let targetY = y + j;
                    if (targetX < 0 || targetY < 0 || targetX >= 4 || targetY >= 4) return false;
                    if (occupied[targetX][targetY]) return false;
                }
            }
        }
        return true;
    }

    function setOccupied(x, y, w, h, layout, val) {
        for (let i = 0; i < w; i++) {
            for (let j = 0; j < h; j++) {
                if (layout[j][i] === 1) {
                    occupied[x + i][y + j] = val;
                }
            }
        }
    }

    function deploySprint() {
        let occupiedCells = 0;
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) {
                if (occupied[i][j]) occupiedCells++;
            }
        }
        state.fillRate = Math.round((occupiedCells / 16) * 100);
        state.timeTaken = Math.round((Date.now() - tetrisStartTime) / 1000);
        
        state.tiebreakerBlocks = []; // reset to avoid duplicates
        Object.keys(blockStates).forEach(id => {
            const s = blockStates[id];
            if (s.isPlaced) {
                state.tiebreakerBlocks.push(id);
            }
        });

        // 1. 테트리스가 어태치되어있던 풀 오버레이 영역을 비활성화/숨김 처리
        const overlay = document.querySelector('.attachment-tetris');
        if (overlay) {
            overlay.classList.remove('tetris-full-overlay');
            const tetrisArticle = overlay.querySelector('#stage-tetris');
            if (tetrisArticle) tetrisArticle.style.display = 'none';
        }

        // 2. 사용자 말풍선으로 테트리스 배포 상황 피드백 노출
        const nextStep = state.selectedOptionIds.length + 1;
        appendUserMessage(`[프로젝트 배포 완료] 총 ${state.tiebreakerBlocks.length}개의 맞춤 기술 스택을 구성하여 배포했습니다.`, nextStep);

        // Push state snapshot right before marking tetrisFinished = true to allow undo back to tetris board
        state.history.push({
            selectedOptionIds: [...state.selectedOptionIds],
            angerScoreTypes: [...state.angerScoreTypes],
            tetrisFinished: state.tetrisFinished
        });

        state.tetrisFinished = true; // Mark tetris phase as fully finished

        // 3. 백엔드에 테트리스 배치 정보와 함께 다음 적응형 질문 요청
        requestNextAdaptive();
    }

    function finalizeSubmission() {
        const form = document.getElementById('kcyAdaptiveForm');
        state.selectedOptionIds.forEach(id => {
            form.innerHTML += `<input type="hidden" name="selectedOptionIds" value="${id}">`;
        });
        state.angerScoreTypes.forEach(type => {
            form.innerHTML += `<input type="hidden" name="angerScoreTypes" value="${type}">`;
        });
        state.tiebreakerBlocks.forEach(b => {
            form.innerHTML += `<input type="hidden" name="tiebreakerBlocks" value="${b}">`;
        });
        form.innerHTML += `<input type="hidden" name="timeTaken" value="${state.timeTaken}">`;
        form.innerHTML += `<input type="hidden" name="fillRate" value="${state.fillRate}">`;
        form.submit();
    }
</script>
</body>
</html>
