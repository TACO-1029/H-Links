<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${currentChapter.chapterTitle} + ' - 온라인 학습'">온라인 학습 - H-Link</title>

    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-chapter.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="chapter-shell">
    <a th:href="@{/courses/{courseId}(courseId=${course.courseId})}" class="chapter-back">
        <i class="fa-solid fa-chevron-left"></i>
        강의 상세로 돌아가기
    </a>

    <div class="chapter-layout">
        <section class="chapter-main">
            <article class="learning-player">
                <div class="learning-player__title"
                     th:text="${currentChapter.chapterOrder} + '강. ' + ${currentChapter.chapterTitle}">
                    1강. App Router의 핵심 원리
                </div>

                <div class="learning-video">
                    <video th:if="${currentChapter.playableVideoUrl != null and currentChapter.playableVideoUrl != ''}"
                           th:src="${currentChapter.playableVideoUrl}"
                           controls
                           preload="metadata"></video>
                    <div class="learning-video__placeholder"
                         th:unless="${currentChapter.playableVideoUrl != null and currentChapter.playableVideoUrl != ''}">
                        <button class="learning-video__play" type="button" aria-label="재생">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
            </article>

            <article class="learning-guide">
                <div>
                    <h2>학습 가이드</h2>
                    <p>진도율 95% 이상 및 퀴즈 풀이 시 해당 챕터는 수강완료 처리됩니다.</p>
                </div>
                <div class="learning-guide__progress">
                    <span>현재 챕터 달성률</span>
                    <strong class="js-current-progress"
                            th:text="${currentChapter.progressRate != null ? currentChapter.progressRate + '%' : '0%'}">0%</strong>
                </div>
            </article>
        </section>

        <aside class="chapter-sidebar">
            <div class="chapter-sidebar__header">
                <h2>학습 목차</h2>
                <span th:text="'전체 진도 ' + ${course.progressRate != null ? course.progressRate : 0} + '%'">전체 진도 0%</span>
            </div>

            <div class="chapter-toc">
                <a th:each="chapter : ${course.chapters}"
                   th:href="@{/courses/{courseId}/chapters/{chapterId}(courseId=${course.courseId}, chapterId=${chapter.chapterId})}"
                   class="chapter-toc__item"
                   th:classappend="${chapter.chapterId == currentChapter.chapterId} ? ' is-active' : ''">
                    <span class="chapter-toc__order" th:text="${chapter.chapterOrder} + '강'">1강</span>
                    <strong th:text="${chapter.chapterOrder} + '강. ' + ${chapter.chapterTitle}">
                        1강. App Router의 핵심 원리
                    </strong>
                    <span class="chapter-toc__bar"
                          th:style="|--progress:${chapter.progressRate != null ? chapter.progressRate : 0}%|"
                          aria-hidden="true"></span>
                    <span class="chapter-toc__meta">
                        <span th:text="'진도 ' + ${chapter.progressRate != null ? chapter.progressRate : 0} + '%'">진도 0%</span>
                        <span th:text="${chapter.durationSeconds != null and chapter.durationSeconds > 0
                                ? '0:00 / ' + (chapter.durationSeconds / 60) + ':' + #numbers.formatInteger(chapter.durationSeconds % 60, 2)
                                : '0:00 / 0:00'}">0:00 / 0:00</span>
                    </span>
                </a>
            </div>
        </aside>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const courseId = /*[[${course.courseId}]]*/ null;
        const chapterId = /*[[${currentChapter.chapterId}]]*/ null;
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const video = document.querySelector('.learning-video video');
        const placeholderPlayButton = document.querySelector('.learning-video__play');
        const currentProgressText = document.querySelector('.js-current-progress');
        let startRequested = false;
        let progressTimer = null;
        let restoredProgress = false;
        let completed = false;

        function buildHeaders(json) {
            const headers = {
                'Accept': 'application/json'
            };
            if (json) {
                headers['Content-Type'] = 'application/json';
            }
            if (csrfHeader && csrfToken) {
                headers[csrfHeader] = csrfToken;
            }
            return headers;
        }

        async function startLearning() {
            if (startRequested || !courseId || !chapterId) {
                return;
            }

            startRequested = true;

            try {
                const response = await fetch(`/courses/${courseId}/chapters/${chapterId}/learning/start`, {
                    method: 'POST',
                    headers: buildHeaders(false),
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    startRequested = false;
                }
            } catch (error) {
                startRequested = false;
            }
        }

        async function loadProgress() {
            if (!courseId || !chapterId) {
                return null;
            }

            try {
                const response = await fetch(`/courses/${courseId}/chapters/${chapterId}/learning/progress`, {
                    method: 'GET',
                    headers: buildHeaders(false),
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    return null;
                }

                const body = await response.json();
                return body?.data || null;
            } catch (error) {
                return null;
            }
        }

        async function restoreLastPosition() {
            if (!video || restoredProgress) {
                return;
            }

            restoredProgress = true;

            const progress = await loadProgress();
            const lastPlaySeconds = Number(progress?.lastPlaySeconds || 0);

            if (lastPlaySeconds > 0 && Number.isFinite(video.duration) && lastPlaySeconds < video.duration) {
                video.currentTime = lastPlaySeconds;
            }
        }

        function renderCurrentProgress(progress) {
            if (!currentProgressText || !progress) {
                return;
            }

            const progressRate = Number(progress.progressRate || 0);
            currentProgressText.textContent = `${progressRate}%`;
        }

        function getProgressPayload(eventType, flush, forceCompleted) {
            const currentTime = video ? Math.floor(video.currentTime || 0) : 0;
            const duration = video && Number.isFinite(video.duration) ? Math.floor(video.duration) : 0;

            return {
                lastPlaySeconds: currentTime,
                durationSeconds: duration,
                eventType: eventType || 'PROGRESS',
                flush: Boolean(flush),
                completed: Boolean(forceCompleted)
            };
        }

        async function saveProgress(eventType, flush, forceCompleted, keepalive) {
            if (!courseId || !chapterId || !video || !restoredProgress) {
                return;
            }

            const payload = getProgressPayload(eventType, flush, forceCompleted);

            try {
                const response = await fetch(`/courses/${courseId}/chapters/${chapterId}/learning/progress`, {
                    method: 'PATCH',
                    headers: buildHeaders(true),
                    body: JSON.stringify(payload),
                    credentials: 'same-origin',
                    keepalive: Boolean(keepalive)
                });

                if (response.ok && !keepalive) {
                    renderCurrentProgress(await loadProgress());
                }
            } catch (error) {
                // Progress saving is best-effort during playback and page exit.
            }
        }

        function startProgressTimer() {
            if (progressTimer || completed) {
                return;
            }

            progressTimer = window.setInterval(function () {
                if (video && !video.paused && !video.ended) {
                    saveProgress('PROGRESS', false, false, false);
                }
            }, 15000);
        }

        function stopProgressTimer() {
            if (!progressTimer) {
                return;
            }

            window.clearInterval(progressTimer);
            progressTimer = null;
        }

        if (video) {
            video.addEventListener('loadedmetadata', restoreLastPosition);
            video.addEventListener('play', function () {
                startLearning();
                startProgressTimer();
            });
            video.addEventListener('pause', function () {
                stopProgressTimer();
                if (!completed && !video.ended) {
                    saveProgress('PAUSE', true, false, false);
                }
            });
            video.addEventListener('ended', function () {
                completed = true;
                stopProgressTimer();
                saveProgress('COMPLETE', true, true, false);
            });
        }

        if (placeholderPlayButton) {
            placeholderPlayButton.addEventListener('click', startLearning);
        }

        window.addEventListener('pagehide', function () {
            if (!completed) {
                saveProgress('EXIT', true, false, true);
            }
        });
    });
</script>
</body>
</html>
