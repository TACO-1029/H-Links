<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course.courseTitle} + ' - H-Link'">강의 상세 - H-Link</title>

    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ========================================================
           [이슈 #31] 와이어프레임 100% 일치 고도화 컬러 및 스페이싱 토큰
           ======================================================== */
        :root {
            --bg-main: #F4F5F7;          /* 레퍼런스 백그라운드 */
            --bg-card: #FFFFFF;          /* 프리미엄 카드 */
            --primary-green: #11A36A;    /* 레퍼런스 메인 그린 */
            --text-primary: #111827;     /* 딥 다크 텍스트 */
            --text-muted: #98A2B3;       /* 뮤트 그레이 */
            --border-color: #E5E7EB;     /* 라이트 보더 */
            --radius-premium: 24px;      /* 프리미엄 라디우스 24 */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: "Pretendard", sans-serif;
        }

        /* 와이드 레이아웃 스케일 (1520px) */
        .detail-wrap {
            max-width: 1520px;
            margin: 32px auto 80px;
            padding: 0 40px;
        }

        /* 7:3 가변 비율 및 48px 거터 그리드 */
        .detail-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 48px;
            align-items: start;
        }

        /* ========================================================
           [좌측 카드 영역: Left Card]
           ======================================================== */
        .left-card {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* 4. 혁신적인 Thumbnail 텍스트 임베딩 히어로 배너 */
        .hero-banner {
            position: relative;
            height: 470px;
            border-radius: var(--radius-premium);
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .hero-banner img.banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 어두운 선형 그라디언트 딥 오버레이 */
        .hero-banner::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                    180deg,
                    rgba(0, 0, 0, 0.2) 0%,
                    rgba(0, 0, 0, 0.75) 100%
            );
            z-index: 1;
        }

        /* 히어로 배너 내부 임베딩 콘텐츠 */
        .hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            z-index: 2; /* 오버레이보다 위 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .badge-row {
            display: flex;
            gap: 8px;
        }

        .premium-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-cate {
            background: rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
            backdrop-filter: blur(4px);
        }

        .badge-type-online {
            background: #E8F7F0;
            color: var(--primary-green);
        }

        .badge-type-offline {
            background: #FEF2F2;
            color: #DC2626;
        }

        .embedded-title {
            font-size: 34px;
            font-weight: 700;
            color: #FFFFFF;
            margin: 0;
            line-height: 1.3;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 메타 테이블 (배너 하단 정보 행) */
        .meta-table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-premium);
            padding: 24px 40px;
            display: flex;
            justify-content: flex-start;
            gap: 64px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meta-icon-wrapper {
            width: 44px;
            height: 44px;
            background: #E8F7F0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-green);
            font-size: 18px;
        }

        .meta-info {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 소개 및 커리큘럼 카드 */
        .curriculum-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-premium);
            padding: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            background-color: var(--primary-green);
            border-radius: 2px;
        }

        .course-description {
            font-size: 16px;
            color: #374151;
            line-height: 1.7;
            white-space: pre-wrap;
            margin: 0;
        }

        /* 다운로드 프리미엄 링크 */
        .download-box {
            margin-top: 24px;
            padding: 16px 24px;
            background: #F8FAFC;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .download-box a {
            color: var(--primary-green);
            font-weight: 600;
            text-decoration: none;
        }

        .download-box a:hover {
            text-decoration: underline;
        }

        /* ========================================================
           [우측 카드 영역: Right Sticky Card]
           ======================================================== */
        .right-sticky-card {
            position: sticky;
            top: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-premium);
            padding: 32px;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.04);
        }

        /* 모집/수강 상태 표시 헤더 */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .status-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-indicator {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-open {
            background-color: #E8F7F0;
            color: var(--primary-green);
        }

        .status-closed {
            background-color: #F3F4F6;
            color: var(--text-muted);
        }

        /* 상세 스펙 리스트 (Stats) */
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 32px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .stat-label {
            color: var(--color-text-secondary, #475569);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label i {
            color: var(--text-muted);
            width: 16px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 대형 CTA 버튼 */
        .btn-cta {
            display: block;
            width: 100%;
            padding: 18px;
            text-align: center;
            background: var(--primary-green);
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn-cta:hover:not(:disabled) {
            background: #0E8558;
            box-shadow: 0 8px 20px rgba(17, 163, 106, 0.25);
            transform: translateY(-1px);
        }

        .btn-cta:disabled {
            background: #D1D5DB;
            color: #9CA3AF;
            cursor: not-allowed;
        }

        /* 반응형 디바이스 튜닝 */
        @media (max-width: 1200px) {
            .detail-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
            .right-sticky-card {
                position: static;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="detail-wrap">
    <div class="detail-grid">

        <div class="left-card">

            <div class="hero-banner">
                <img class="banner-img"
                     th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : '/images/default_course.png'}"
                     alt="강의 메인 배너">

                <div class="hero-content">
                    <div class="badge-row">
                        <span class="premium-badge badge-cate" th:text="${course.categoryType == 'CAREER_HIGH' ? '커리어 하이' : '커리어 패스'}"></span>
                        <span class="premium-badge badge-type-online" th:if="${course.online}">온라인 과정</span>
                        <span class="premium-badge badge-type-offline" th:unless="${course.online}">오프라인 특강</span>
                    </div>
                    <h1 class="embedded-title" th:text="${course.courseTitle}">강의 타이틀 명세</h1>
                </div>
            </div>

            <div class="meta-table-card">
                <div class="meta-item">
                    <div class="meta-icon-wrapper"><i class="fas fa-user-tie"></i></div>
                    <div class="meta-info">
                        <span class="meta-label">담당 강사</span>
                        <span class="meta-value" th:text="${course.instructorName != null ? course.instructorName : 'HRD 인재개발원'}">김강사</span>
                    </div>
                </div>
                <div class="meta-item" th:if="${course.totalDurationTime != null}">
                    <div class="meta-icon-wrapper"><i class="fas fa-hourglass-half"></i></div>
                    <div class="meta-info">
                        <span class="meta-label">총 교육 시간</span>
                        <span class="meta-value" th:text="${course.totalDurationTime} + '시간'">30시간</span>
                    </div>
                </div>
            </div>

            <div class="curriculum-card">
                <h2 class="section-title">과정 상세 개요</h2>
                <p class="course-description" th:text="${course.description}">과정 핵심 설계 목적 및 세부 학습 로직 명세 CLOB 데이터 바인딩 영역.</p>

                <div class="download-box" th:if="${course.online and course.courseMaterialUrl != null}">
                    <i class="fas fa-cloud-download-alt" style="color: var(--primary-green); font-size: 18px;"></i>
                    <span>본 과정은 강의 교재 및 실습 가이드 PDF를 상시 제공합니다.</span>
                    <a th:href="${course.courseMaterialUrl}" target="_blank" download>교재 다운로드</a>
                </div>
            </div>

        </div>

        <aside class="right-sticky-card">

            <div class="status-header">
                <span class="status-title">현재 운영 상태</span>

                <th:block th:if="${course.online}">
                    <span class="status-indicator status-open" th:if="${course.onlineStatus == 'OPEN'}">수강 가능</span>
                    <span class="status-indicator status-closed" th:unless="${course.onlineStatus == 'OPEN'}">수강 종료</span>
                </th:block>

                <th:block th:unless="${course.online}">
                    <span class="status-indicator status-open" th:if="${course.offlineStatus == 'OPEN'}">모집 중</span>
                    <span class="status-indicator status-closed" th:unless="${course.offlineStatus == 'OPEN'}">모집 마감</span>
                </th:block>
            </div>

            <div class="stats-list">
                <div class="stat-row">
                    <span class="stat-label"><i class="fas fa-graduation-cap"></i> 교육 방식</span>
                    <span class="stat-value" th:text="${course.online ? '온라인 VOD' : '오프라인 집합교육'}">방식</span>
                </div>

                <th:block th:unless="${course.online}">
                    <div class="stat-row">
                        <span class="stat-label"><i class="fas fa-map-marker-alt"></i> 집결 장소</span>
                        <span class="stat-value" th:text="${course.location != null ? course.location : '사내 본관 교육장'}">IT센터</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label"><i class="fas fa-users"></i> 제한 정원</span>
                        <span class="stat-value" th:text="${course.capacity != null ? course.capacity + '명 선착순' : '제한 없음'}">30명</span>
                    </div>
                    <div class="stat-row" th:if="${course.applyStartDate != null}">
                        <span class="stat-label"><i class="fas fa-calendar-alt"></i> 신청 접수</span>
                        <span class="stat-value" style="font-size: 13px;"
                              th:text="|${#temporals.format(course.applyStartDate, 'MM/dd')} ~ ${#temporals.format(course.applyEndDate, 'MM/dd')}|">기간</span>
                    </div>
                    <div class="stat-row" th:if="${course.courseStartDate != null}">
                        <span class="stat-label"><i class="fas fa-laptop-code"></i> 교육 기간</span>
                        <span class="stat-value" style="font-size: 13px;"
                              th:text="|${#temporals.format(course.courseStartDate, 'MM/dd')} ~ ${#temporals.format(course.courseEndDate, 'MM/dd')}|">기간</span>
                    </div>
                </th:block>
            </div>

            <div class="cta-action-area">
                <th:block th:if="${course.online}">
                    <button th:if="${course.onlineStatus == 'OPEN'}" class="btn-cta" onclick="alert('온라인 강의 학습 환경으로 이동합니다. (다음 이슈 연동)')">
                        즉시 학습하기
                    </button>
                    <button th:unless="${course.onlineStatus == 'OPEN'}" class="btn-cta" disabled>
                        학습이 불가능한 과정입니다
                    </button>
                </th:block>

                <th:block th:unless="${course.online}">
                    <button th:if="${course.offlineStatus == 'OPEN'}" class="btn-cta" onclick="alert('오프라인 집합 과정 수강 신청이 접수되었습니다. (다음 이슈 연동)')">
                        수강 신청하기
                    </button>
                    <button th:unless="${course.offlineStatus == 'OPEN'}" class="btn-cta" disabled>
                        신청이 마감되었습니다
                    </button>
                </th:block>
            </div>

        </aside>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
