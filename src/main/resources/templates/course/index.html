<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>교육 콘텐츠 - H-Link</title>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-index.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-header-banner">
    <div class="banner-content layout-container">
        <h1 class="banner-title">교육 콘텐츠</h1>
        <!--
        <p class="banner-subtitle">H-Link 플랫폼 안에서 대도약(Career-High)과 성장 경로(Career-Path)를 설계하세요.</p>
        -->
        <nav class="category-tabs">
            <a th:href="@{/courses}" class="tab-link"
               th:classappend="${currentCategory == null or currentCategory == ''} ? 'active' : ''">전체 강의</a>
            <a th:href="@{/courses(categoryType='CAREER_HIGH')}" class="tab-link"
               th:classappend="${currentCategory == 'CAREER_HIGH'} ? 'active' : ''">커리어 하이</a>
            <a th:href="@{/courses(categoryType='CAREER_PATH')}" class="tab-link"
               th:classappend="${currentCategory == 'CAREER_PATH'} ? 'active' : ''">커리어 패스</a>
        </nav>
    </div>
</div>

<main class="main-layout layout-container">
    <aside class="sidebar">
        <form id="courseFilterForm" th:action="@{/courses}" method="get">
            <input type="hidden"
                   name="categoryType"
                   th:if="${currentCategory != null and currentCategory != ''}"
                   th:value="${currentCategory}">
        <div class="filter-section">
            <h3 class="filter-title">교육 운영 유형</h3>
            <label class="filter-label">
                <input type="checkbox"
                       name="courseTypes"
                       value="ONLINE"
                       th:checked="${selectedCourseTypes == null or #lists.isEmpty(selectedCourseTypes) or #lists.contains(selectedCourseTypes, 'ONLINE')}">
                온라인 상시 강좌
            </label>
            <label class="filter-label">
                <input type="checkbox"
                       name="courseTypes"
                       value="OFFLINE"
                       th:checked="${selectedCourseTypes == null or #lists.isEmpty(selectedCourseTypes) or #lists.contains(selectedCourseTypes, 'OFFLINE')}">
                오프라인 집합 특강
            </label>
        </div>
        <div class="filter-section">
            <h3 class="filter-title">핵심 기술 스택 (Tech)</h3>
            <div class="skill-filter-list" th:if="${skillGroups != null and !#lists.isEmpty(skillGroups)}">
                <details class="skill-filter-group" th:each="group : ${skillGroups}">
                    <summary>
                        <span th:text="${group.skillName}">백엔드</span>
                        <span class="skill-filter-count" th:text="${#lists.size(group.skills)}">0</span>
                    </summary>
                    <div class="skill-filter-options">
                        <label class="filter-label skill-filter-option" th:each="skill : ${group.skills}">
                            <input type="checkbox"
                                   name="skillIds"
                                   th:value="${skill.skillId}"
                                   th:checked="${selectedSkillIds != null and #lists.contains(selectedSkillIds, skill.skillId)}">
                            <span th:text="${skill.skillName}">Spring Boot</span>
                        </label>
                    </div>
                </details>
            </div>
            <p class="filter-empty" th:unless="${skillGroups != null and !#lists.isEmpty(skillGroups)}">
                등록된 기술 스택이 없습니다.
            </p>
            <button type="button"
                    id="resetSkillFilterButton"
                    class="filter-reset-btn"
                    th:if="${skillGroups != null and !#lists.isEmpty(skillGroups)}">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                초기화
            </button>
        </div>
        </form>
    </aside>

    <section id="courseResults" class="content-area" th:fragment="courseResults">
        <div class="content-toolbar">
            <div class="total-count">표시된 강의 <span id="renderedCourseCount" th:text="${courses != null ? courses.size() : 0}">0</span>건</div>

            <div class="toolbar-right">
                <div class="select-custom-wrap">
                    <select id="courseSortSelect" class="select-custom" name="sort" form="courseFilterForm">
                        <option value="latest" th:selected="${selectedSort == null or selectedSort == 'latest'}">최신 등록순</option>
                        <option value="popular" th:selected="${selectedSort == 'popular'}">인기순</option>
                    </select>
                </div>

                <div class="view-controls">
                    <button type="button" id="btnGrid" class="view-btn active" title="카드형 보기">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/>
                        </svg>
                    </button>
                    <button type="button" id="btnList" class="view-btn" title="목록형 보기">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="courseContainer" class="course-container view-grid">

            <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 7h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
                <h4 class="empty-state-title">개설된 교육 콘텐츠가 없습니다.</h4>
                <p class="empty-state-description">현재 카테고리의 신규 명품 강의를 기획 및 준비하고 있습니다.</p>
            </div>

            <a th:each="course : ${courses}" th:href="@{/courses/{id}(id=${course.courseId})}" class="course-card-link">
                <article class="course-card">
                    <div class="card-thumb-wrap">
                        <img th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : '/images/common/hyundai_futurenet.webp'}"
                             alt="강의 썸네일"
                             class="card-thumbnail"
                             loading="lazy"
                             decoding="async"
                             onerror="this.onerror=null; this.src='/images/common/hyundai_futurenet.webp';">
                        <div class="card-badges">
                            <span class="badge"
                                  th:classappend="${course.courseType == 'ONLINE' ? 'badge-online' : 'badge-offline'}"
                                  th:text="${course.courseType == 'ONLINE' ? '온라인' : (course.courseType == 'OFFLINE' ? '오프라인' : '유형 미정')}">
                                    유형 미정
                            </span>
                            <span class="badge badge-status" th:text="${course.virtualStatus}">상시 운영</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title" th:text="${course.courseTitle}">클라우드 네이티브 아키텍처</h3>
                        <div class="card-instructor"
                             th:text="|강사 : ${course.instructorName != null ? course.instructorName : '인재개발원'}|">강사 :
                            홍길동
                        </div>
                    </div>
                </article>
            </a>

        </div>
        <div id="courseInfiniteSentinel"
             class="course-infinite-sentinel"
             th:data-has-next="${initialHasNext}">
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        const courseFilterForm = document.getElementById('courseFilterForm');
        let currentView = 'grid';
        let currentPage = 0;
        let hasNext = document.getElementById('courseInfiniteSentinel')?.dataset.hasNext === 'true';
        let isLoading = false;
        let observer = null;
        const pageSize = 12;
        const placeholderImage = '/images/common/hyundai_futurenet.webp';

        const buildFilterParams = () => {
            const params = new URLSearchParams(new FormData(courseFilterForm));
            params.set('page', String(currentPage));
            params.set('size', String(pageSize));
            return params;
        };

        const escapeHtml = (value) => {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        };

        const getCourseTypeLabel = (courseType) => {
            if (courseType === 'ONLINE') {
                return '온라인';
            }
            if (courseType === 'OFFLINE') {
                return '오프라인';
            }
            return '유형 미정';
        };

        const getCourseTypeBadgeClass = (courseType) => courseType === 'ONLINE' ? 'badge-online' : 'badge-offline';

        const renderCourseCard = (course) => {
            const thumbnailUrl = course.thumbnailUrl || placeholderImage;
            return `
                <a href="/courses/${encodeURIComponent(course.courseId)}" class="course-card-link">
                    <article class="course-card">
                        <div class="card-thumb-wrap">
                            <img src="${escapeHtml(thumbnailUrl)}"
                                 alt="강의 썸네일"
                                 class="card-thumbnail"
                                 loading="lazy"
                                 decoding="async"
                                 onerror="this.onerror=null; this.src='${placeholderImage}';">
                            <div class="card-badges">
                                <span class="badge ${getCourseTypeBadgeClass(course.courseType)}">${getCourseTypeLabel(course.courseType)}</span>
                                <span class="badge badge-status">${escapeHtml(course.virtualStatus || '상태 확인 중')}</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${escapeHtml(course.courseTitle || '제목 없는 강의')}</h3>
                            <div class="card-instructor">강사 : ${escapeHtml(course.instructorName || '인재개발원')}</div>
                        </div>
                    </article>
                </a>
            `;
        };

        const renderEmptyState = () => `
            <div class="empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 7h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
                <h4 class="empty-state-title">개설된 교육 콘텐츠가 없습니다.</h4>
                <p class="empty-state-description">현재 카테고리의 신규 명품 강의를 기획 및 준비하고 있습니다.</p>
            </div>
        `;

        const updateRenderedCount = () => {
            const renderedCourseCount = document.getElementById('renderedCourseCount');
            const courseContainer = document.getElementById('courseContainer');
            if (renderedCourseCount && courseContainer) {
                renderedCourseCount.textContent = String(courseContainer.querySelectorAll('.course-card-link').length);
            }
        };

        const updateSentinel = (message) => {
            const sentinel = document.getElementById('courseInfiniteSentinel');
            if (!sentinel) {
                return;
            }
            sentinel.innerHTML = `<span class="course-loading-message">${escapeHtml(message)}</span>`;
            sentinel.classList.toggle('is-end', !hasNext);
        };

        const applyCurrentView = () => {
            const btnGrid = document.getElementById('btnGrid');
            const btnList = document.getElementById('btnList');
            const courseContainer = document.getElementById('courseContainer');

            if (!btnGrid || !btnList || !courseContainer) {
                return;
            }

            btnGrid.classList.toggle('active', currentView === 'grid');
            btnList.classList.toggle('active', currentView === 'list');
            courseContainer.classList.toggle('view-grid', currentView === 'grid');
            courseContainer.classList.toggle('view-list', currentView === 'list');
        };

        const bindResultControls = () => {
            const btnGrid = document.getElementById('btnGrid');
            const btnList = document.getElementById('btnList');
            const courseSortSelect = document.getElementById('courseSortSelect');

            if (btnGrid) {
                btnGrid.addEventListener('click', () => {
                    currentView = 'grid';
                    applyCurrentView();
                });
            }

            if (btnList) {
                btnList.addEventListener('click', () => {
                    currentView = 'list';
                    applyCurrentView();
                });
            }

            if (courseSortSelect) {
                courseSortSelect.addEventListener('change', () => reloadCourses());
            }

            applyCurrentView();
        };

        const disconnectObserver = () => {
            if (observer) {
                observer.disconnect();
            }
        };

        const loadCourses = async ({reset = false} = {}) => {
            if (!courseFilterForm) {
                return;
            }
            if (isLoading || (!hasNext && !reset)) {
                return;
            }

            isLoading = true;
            const params = buildFilterParams();
            const queryString = params.toString();
            const apiUrl = `/api/courses${queryString ? '?' + queryString : ''}`;

            try {
                const response = await fetch(apiUrl, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Failed to load course list: ${response.status}`);
                }

                const data = await response.json();
                const courseContainer = document.getElementById('courseContainer');
                if (!courseContainer) {
                    return;
                }

                if (reset) {
                    courseContainer.innerHTML = '';
                }

                const courses = Array.isArray(data.content) ? data.content : [];
                if (courses.length === 0 && currentPage === 0) {
                    courseContainer.innerHTML = renderEmptyState();
                } else {
                    courseContainer.insertAdjacentHTML('beforeend', courses.map(renderCourseCard).join(''));
                }

                hasNext = Boolean(data.hasNext);
                currentPage = Number(data.page ?? currentPage);
                updateRenderedCount();
                applyCurrentView();

                if (hasNext) {
                    currentPage += 1;
                    updateSentinel('더 많은 강의를 불러오는 중입니다.');
                } else {
                    disconnectObserver();
                }
            } catch (error) {
                console.error(error);
                updateSentinel('강의를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.');
                disconnectObserver();
            } finally {
                isLoading = false;
            }
        };

        const reloadCourses = async () => {
            currentPage = 0;
            hasNext = true;
            disconnectObserver();

            const params = new URLSearchParams(new FormData(courseFilterForm));
            const pageUrl = `/courses${params.toString() ? '?' + params.toString() : ''}`;
            window.history.replaceState(null, '', pageUrl);

            await loadCourses({reset: true});
            initializeObserver();
        };

        const initializeObserver = () => {
            const sentinel = document.getElementById('courseInfiniteSentinel');
            if (!sentinel) {
                return;
            }
            disconnectObserver();
            if (!hasNext) {
                return;
            }
            observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        loadCourses();
                    }
                });
            }, {
                rootMargin: '240px 0px'
            });
            observer.observe(sentinel);
        };

        if (courseFilterForm) {
            courseFilterForm.querySelectorAll('input[name="skillIds"], input[name="courseTypes"]').forEach((checkbox) => {
                checkbox.addEventListener('change', () => {
                    reloadCourses();
                });
            });

            const resetSkillFilterButton = document.getElementById('resetSkillFilterButton');
            if (resetSkillFilterButton) {
                resetSkillFilterButton.addEventListener('click', () => {
                    courseFilterForm.querySelectorAll('input[name="skillIds"]').forEach((checkbox) => {
                        checkbox.checked = false;
                    });
                    reloadCourses();
                });
            }
        }

        bindResultControls();
        currentPage = hasNext ? 1 : 0;
        updateRenderedCount();
        initializeObserver();
    });
</script>
</body>
</html>
