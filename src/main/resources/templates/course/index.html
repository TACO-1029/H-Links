<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>교육 콘텐츠 - H-Link</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/course-index.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-header-banner">
    <div class="banner-content">
        <h1 class="banner-title">교육 콘텐츠</h1>
        <!--
        <p class="banner-subtitle">H-Link 플랫폼 안에서 대도약(Career-High)과 성장 경로(Career-Path)를 설계하세요.</p>
        -->
        <nav class="category-tabs">
            <a th:href="@{/courses}" class="tab-link"
               th:classappend="${currentCategory == null or currentCategory == ''} ? 'active' : ''">전체 강의</a>
            <a th:href="@{/courses(categoryType='CAREER_HIGH')}" class="tab-link"
               th:classappend="${currentCategory == 'CAREER_HIGH'} ? 'active' : ''">커리어 하이</a>
            <a th:href="@{/courses(categoryType='CAREER_PATH')}" class="tab-link"
               th:classappend="${currentCategory == 'CAREER_PATH'} ? 'active' : ''">커리어 패스</a>
        </nav>
    </div>
</div>

<main class="main-layout">
    <aside class="sidebar">
        <div class="filter-section">
            <h3 class="filter-title">교육 운영 유형</h3>
            <label class="filter-label"><input type="checkbox" checked> 온라인 상시 강좌</label>
            <label class="filter-label"><input type="checkbox" checked> 오프라인 집합 특강</label>
        </div>
        <div class="filter-section">
            <h3 class="filter-title">핵심 기술 스택 (Tech)</h3>
            <label class="filter-label"><input type="checkbox"> Java / JDK 17</label>
            <label class="filter-label"><input type="checkbox"> Spring Boot 3.x</label>
            <label class="filter-label"><input type="checkbox"> React / Next.js</label>
            <label class="filter-label"><input type="checkbox"> Oracle DB SQL</label>
        </div>
    </aside>

    <section class="content-area">
        <div class="content-toolbar">
            <div class="total-count">조회된 강의 <span th:text="${courses != null ? courses.size() : 0}">0</span>건</div>

            <div class="toolbar-right">
                <div class="select-custom-wrap">
                    <select class="select-custom">
                        <option>최신 등록순</option>
                        <option>인기 명품순</option>
                    </select>
                </div>

                <div class="view-controls">
                    <button type="button" id="btnGrid" class="view-btn active" title="카드형 보기">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/>
                        </svg>
                    </button>
                    <button type="button" id="btnList" class="view-btn" title="목록형 보기">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="courseContainer" class="course-container view-grid">

            <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 7h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
                <h4 class="empty-state-title">개설된 교육 콘텐츠가 없습니다.</h4>
                <p class="empty-state-description">현재 카테고리의 신규 명품 강의를 기획 및 준비하고 있습니다.</p>
            </div>

            <a th:each="course : ${courses}" th:href="@{/courses/{id}(id=${course.courseId})}" class="course-card-link">
                <article class="course-card">
                    <div class="card-thumb-wrap">
                        <img th:src="@{${course.thumbnailUrl != null ? course.thumbnailUrl : '/images/default-thumbnail.png'}}"
                             alt="강의 썸네일"
                             class="card-thumbnail"
                             onerror="this.onerror=null; this.src='/images/default-thumbnail.png';">
                    </div>
                    <div class="card-body">
                        <div class="card-badges">
                            <span class="badge"
                                  th:classappend="${course.courseType == 'ONLINE' ? 'badge-online' : 'badge-offline'}"
                                  th:text="${course.courseType}">ONLINE</span>
                            <span class="badge badge-status" th:text="${course.virtualStatus}">상시 운영</span>
                        </div>
                        <h3 class="card-title" th:text="${course.courseTitle}">클라우드 네이티브 아키텍처</h3>
                        <div class="card-instructor"
                             th:text="|강사 : ${course.instructorName != null ? course.instructorName : '인재개발원'}|">강사 :
                            홍길동
                        </div>
                    </div>
                </article>
            </a>

        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const btnGrid = document.getElementById('btnGrid');
        const btnList = document.getElementById('btnList');
        const courseContainer = document.getElementById('courseContainer');

        btnGrid.addEventListener('click', function () {
            btnGrid.classList.add('active');
            btnList.classList.remove('active');
            courseContainer.classList.remove('view-list');
            courseContainer.classList.add('view-grid');
        });

        btnList.addEventListener('click', function () {
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
            courseContainer.classList.remove('view-grid');
            courseContainer.classList.add('view-list');
        });
    });
</script>
</body>
</html>
