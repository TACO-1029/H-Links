name: "Bug"
description: "버그 수정"
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: "버그 설명"
      description: "어떤 문제가 발생했는지 설명해주세요."
      placeholder: "예: 로그인 실패 시 에러 메시지가 화면에 표시되지 않는다."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "재현 방법"
      description: "버그를 재현하는 순서를 작성해주세요."
      placeholder: |
        1. 로그인 페이지 접속
        2. 잘못된 비밀번호 입력
        3. 로그인 버튼 클릭
        4. 에러 메시지 미표시
    validations:
      required: true

  - type: textarea
    attributes:
      label: "기대 동작"
      description: "정상이라면 어떻게 동작해야 하는지 작성해주세요."

  - type: textarea
    attributes:
      label: "스크린샷"
      description: "필요하다면 스크린샷을 첨부해주세요."